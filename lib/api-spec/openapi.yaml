      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExternalCollaboratorEvent" }
        "403": { description: forbidden }
        "404": { description: contract not found }

  /contracts/{id}/comments:
    get:
      operationId: listContractComments
      tags: [external-collaborators]
      summary: Kommentare zu einem Vertrag (intern + extern) auflisten
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ContractComment" }
        "403": { description: forbidden }
        "404": { description: contract not found }
    post:
      operationId: createContractComment
      tags: [external-collaborators]
      summary: Kommentar als interner User anfügen
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContractCommentCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContractComment" }
        "400": { description: invalid }
        "403": { description: forbidden }
        "404": { description: contract not found }

  /external/{token}:
    get:
      operationId: resolveExternalToken
      tags: [external-collaborators]
      summary: "Public: Magic-Link auflösen und Vertrags-Snapshot zurückgeben"
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalContractView" }
        "401": { description: token revoked or expired }
        "404": { description: invalid token }

  /external/{token}/comments:
    post:
      operationId: createExternalComment
      tags: [external-collaborators]
      summary: "Public: Kommentar als externer Mitwirkender posten (Capability comment erforderlich)"
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContractCommentCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContractComment" }
        "400": { description: invalid }
        "401": { description: token revoked or expired }
        "403": { description: comment capability missing }
        "404": { description: invalid token }

  /external/{token}/contract:
    patch:
      operationId: editExternalContractFields
      tags: [external-collaborators]
      summary: "Public: Vertrags-Felder per Magic-Link aendern (Capability edit_fields + editableFields-Whitelist)"
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExternalContractFieldEdit" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalContractFieldEditResult" }
        "400": { description: invalid }
        "401": { description: token revoked or expired }
        "403": { description: edit_fields capability or field-scope missing }
        "404": { description: invalid token }

  /ai-recommendations:
    get:
      operationId: listAiRecommendations
      tags: [ai-recommendations]
      summary: AI-Empfehlungen filtern (entityType, entityId, status)
      parameters:
        - in: query
          name: entityType
          schema: { type: string }
        - in: query
          name: entityId
          schema: { type: string }
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, accepted, rejected, modified]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AiRecommendation" }
        "400": { description: invalid }

  /ai-recommendations/_metrics:
    get:
      operationId: getAiRecommendationMetrics
      tags: [ai-recommendations]
      summary: Acceptance-Rate und Konfidenz-Kalibrierung pro Prompt
      parameters:
        - in: query
          name: promptKey
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AiRecommendationMetric" }

  /ai-recommendations/{id}:
    patch:
      operationId: patchAiRecommendation
      tags: [ai-recommendations]
      summary: User-Entscheidung (accepted/rejected/modified) zu einer Empfehlung
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiRecommendationPatch" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiRecommendation" }
        "400": { description: invalid }
        "404": { description: not found }

components:
  schemas:

    # ── External Contracts ──
    ExternalContractParty:
      type: object
      required: [role, name]
      properties:
        role:
          type: string
          enum: [customer, supplier, our_entity, third_party, unknown]
        name: { type: string }

    ExternalContractClauseFamily:
      type: object
      required: [name, confidence]
      properties:
        familyId: { type: ["string", "null"] }
        name: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }

    ExternalContract:
      type: object
      required:
        [ id, tenantId, accountId, title, fileName, fileSize, mimeType,
          objectPath, status, autoRenewal, parties,
          identifiedClauseFamilies, confidence, renewalRelevant,
          createdAt, updatedAt ]
      properties:
        id: { type: string }
        tenantId: { type: string }
        accountId: { type: string }
        accountName: { type: ["string", "null"] }
        brandId: { type: ["string", "null"] }
        brandName: { type: ["string", "null"] }
        contractTypeCode: { type: ["string", "null"] }
        objectPath: { type: string }
        fileName: { type: string }
        fileSize: { type: integer }
        mimeType: { type: string }
        status:
          type: string
          enum: [draft, confirmed]
        title: { type: string }
        parties:
          type: array
          items: { $ref: "#/components/schemas/ExternalContractParty" }
        currency: { type: ["string", "null"] }
        valueAmount: { type: ["number", "null"] }
        effectiveFrom: { type: ["string", "null"], format: date }
        effectiveTo: { type: ["string", "null"], format: date }
        autoRenewal: { type: boolean }
        renewalNoticeDays: { type: ["integer", "null"] }
        terminationNoticeDays: { type: ["integer", "null"] }
        governingLaw: { type: ["string", "null"] }
        jurisdiction: { type: ["string", "null"] }
        identifiedClauseFamilies:
          type: array
          items: { $ref: "#/components/schemas/ExternalContractClauseFamily" }
        confidence:
          type: object
          additionalProperties: { type: number, minimum: 0, maximum: 1 }
        aiInvocationId: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        uploadedBy: { type: ["string", "null"] }
        uploadedByName: { type: ["string", "null"] }
        renewalRelevant:
          type: boolean
          description: "true wenn autoRenewal=true und effectiveTo gesetzt ist (Marker für #66)"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ExternalContractDetail:
      allOf:
        - $ref: "#/components/schemas/ExternalContract"
        - type: object
          required: [downloadUrl]
          properties:
            downloadUrl:
              type: string
              description: Signed download URL (TTL 15min) für Original-Dokument

    ExternalContractUploadUrlRequest:
      type: object
      required: [fileName, size, contentType]
      properties:
        fileName: { type: string }
        size: { type: integer }
        contentType: { type: string }

    ExternalContractUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL: { type: string }
        objectPath: { type: string }

    ExternalContractExtractRequest:
      type: object
      required: [objectPath, fileName, mimeType, accountId]
      properties:
        objectPath: { type: string }
        fileName: { type: string }
        mimeType: { type: string }
        accountId: { type: string }

    ExternalContractDraftFields:
      type: object
      properties:
        title: { type: ["string", "null"] }
        contractTypeGuess: { type: ["string", "null"] }
        parties:
          type: array
          items: { $ref: "#/components/schemas/ExternalContractParty" }
        currency: { type: ["string", "null"] }
        valueAmount: { type: ["string", "null"] }
        effectiveFrom: { type: ["string", "null"] }
        effectiveTo: { type: ["string", "null"] }
        autoRenewal: { type: boolean }
        renewalNoticeDays: { type: ["integer", "null"] }
        terminationNoticeDays: { type: ["integer", "null"] }
        governingLaw: { type: ["string", "null"] }
        jurisdiction: { type: ["string", "null"] }
        identifiedClauseFamilies:
          type: array
          items: { $ref: "#/components/schemas/ExternalContractClauseFamily" }
        confidence:
          type: object
          additionalProperties: { type: number }
        # Task #69: aggregierte Konfidenz fuer das gesamte Extraktions-Resultat.
        # Treibt das AIConfidenceBadge im Intake-Wizard.
        overallConfidence: { type: string, enum: [low, medium, high] }
        overallConfidenceReason: { type: string }
        notes:
          type: array
          items: { type: string }
      required:
        - parties
        - autoRenewal
        - identifiedClauseFamilies
        - confidence
        - overallConfidence
        - overallConfidenceReason
        - notes

    ExternalContractExtractResponse:
      type: object
      required: [aiAvailable, suggestion]
      properties:
        aiAvailable: { type: boolean }
        invocationId: { type: ["string", "null"] }
        # Task #69: vorhanden, sobald die KI-Extraktion erfolgreich war.
        # Fehlschlag-Pfade (kein Text, KI nicht konfiguriert, AI error) lassen
        # diese Felder weg.
        recommendationId: { type: ["string", "null"] }
        confidence:
          oneOf:
            - { type: number, minimum: 0, maximum: 1 }
            - { type: "null" }
        confidenceLevel:
          oneOf:
            - { type: string, enum: [low, medium, high] }
            - { type: "null" }
        confidenceReason: { type: ["string", "null"] }
        truncated: { type: boolean }
        charCount: { type: integer }
        errorCode: { type: ["string", "null"] }
        suggestion: { $ref: "#/components/schemas/ExternalContractDraftFields" }

    ExternalContractCreate:
      type: object
      required: [accountId, objectPath, fileName, fileSize, mimeType, title, parties, autoRenewal]
      properties:
        accountId: { type: string }
        brandId: { type: ["string", "null"] }
        contractTypeCode: { type: ["string", "null"] }
        objectPath: { type: string }
        fileName: { type: string }
        fileSize: { type: integer }
        mimeType: { type: string }
        title: { type: string }
        parties:
          type: array
          items: { $ref: "#/components/schemas/ExternalContractParty" }
        currency: { type: ["string", "null"] }
        valueAmount: { type: ["number", "null"] }
        effectiveFrom: { type: ["string", "null"], format: date }
        effectiveTo: { type: ["string", "null"], format: date }
        autoRenewal: { type: boolean }
        renewalNoticeDays: { type: ["integer", "null"] }
        terminationNoticeDays: { type: ["integer", "null"] }
        governingLaw: { type: ["string", "null"] }
        jurisdiction: { type: ["string", "null"] }
        identifiedClauseFamilies:
          type: array
