        isDecisionMaker: { type: boolean }
        phone:
          type: ["string", "null"]

    ContactInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        role: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        isDecisionMaker: { type: boolean }

    ContactPatch:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        role: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        isDecisionMaker: { type: boolean }

    ContactScrapeRequest:
      type: object
      required: [website]
      properties:
        website: { type: string, description: "URL oder Domain (https:// optional)." }

    ScrapedContact:
      type: object
      required: [name, role, isDecisionMaker, sourceUrl, isDuplicate]
      properties:
        name: { type: string }
        role: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        isDecisionMaker: { type: boolean }
        sourceUrl: { type: string }
        isDuplicate: { type: boolean, description: "True, wenn am Account bereits ein Kontakt mit gleichem Namen oder gleicher E-Mail existiert." }

    ContactScrapeResponse:
      type: object
      required: [website, results, pagesCrawled]
      properties:
        website: { type: string, description: "Tatsächlich verwendete URL inkl. Schema." }
        pagesCrawled: { type: integer, description: "Anzahl der erfolgreich abgerufenen Unterseiten." }
        results:
          type: array
          items: { $ref: "#/components/schemas/ScrapedContact" }

    # ── Deals ──
    Deal:
      type: object
      required:
        [
          id, name, accountId, accountName, stage, value, currency, probability,
          expectedCloseDate, ownerId, ownerName, brandId, brandName, companyId,
          companyName, riskLevel, updatedAt
        ]
      properties:
        id: { type: string }
        name: { type: string }
        accountId: { type: string }
        accountName: { type: string }
        stage: { type: string }
        value: { type: number }
        currency: { type: string }
        probability: { type: integer }
        expectedCloseDate: { type: string, format: date }
        ownerId: { type: string }
        ownerName: { type: string }
        brandId: { type: string }
        brandName: { type: string }
        companyId: { type: string }
        companyName: { type: string }
        riskLevel: { type: string }
        updatedAt: { type: string, format: date-time }
        nextStep:
          type: ["string", "null"]

    DealInput:
      type: object
      required: [name, accountId, value, stage, brandId, companyId, ownerId, expectedCloseDate]
      properties:
        name: { type: string }
        accountId: { type: string }
        value: { type: number }
        stage: { type: string }
        brandId: { type: string }
        companyId: { type: string }
        ownerId: { type: string }
        expectedCloseDate: { type: string, format: date }

    DealPatch:
      type: object
      properties:
        name: { type: string }
        stage: { type: string }
        value: { type: number }
        probability: { type: integer }
        riskLevel: { type: string }
        nextStep: { type: string }
        expectedCloseDate: { type: string, format: date }

    DealDetail:
      allOf:
        - $ref: "#/components/schemas/Deal"
        - type: object
          required: [quotes, contracts, approvals, signatures, contacts, negotiations]
          properties:
            quotes:
              type: array
              items: { $ref: "#/components/schemas/Quote" }
            contracts:
              type: array
              items: { $ref: "#/components/schemas/Contract" }
            approvals:
              type: array
              items: { $ref: "#/components/schemas/ApprovalCase" }
            signatures:
              type: array
              items: { $ref: "#/components/schemas/SignaturePackage" }
            contacts:
              type: array
              items: { $ref: "#/components/schemas/Contact" }
            negotiations:
              type: array
              items: { $ref: "#/components/schemas/Negotiation" }

    DealPipeline:
      type: object
      required: [stages]
      properties:
        stages:
          type: array
          items:
            type: object
            required: [stage, label, count, value, deals]
            properties:
              stage: { type: string }
              label: { type: string }
              count: { type: integer }
              value: { type: number }
              deals:
                type: array
                items: { $ref: "#/components/schemas/Deal" }

    TimelineEvent:
      type: object
      required: [id, type, title, description, at, actor]
      properties:
        id: { type: string }
        type: { type: string }
        title: { type: string }
        description: { type: string }
        at: { type: string, format: date-time }
        actor: { type: string }
        dealId:
          type: ["string", "null"]
        dealName:
          type: ["string", "null"]

    # ── Quotes ──
    Quote:
      type: object
      required:
        [
          id, dealId, dealName, number, status, currentVersion, totalAmount,
          discountPct, marginPct, currency, createdAt, validUntil, language
        ]
      properties:
        id: { type: string }
        dealId: { type: string }
        dealName: { type: string }
        number: { type: string }
        status: { type: string }
        currentVersion: { type: integer }
        totalAmount: { type: number }
        discountPct: { type: number }
        marginPct: { type: number }
        currency: { type: string }
        createdAt: { type: string, format: date-time }
        validUntil: { type: string, format: date }
        language:
          type: string
          enum: [de, en]
          description: "Sprachfassung des Angebots."

    QuoteInput:
      type: object
      required: [dealId]
      properties:
        dealId: { type: string }
        validUntil: { type: string, format: date }
        language:
          type: string
          enum: [de, en]
          description: "Optionale Sprachfassung. NULL/leer → Brand-/Tenant-Default."

    QuotePatchInput:
      type: object
      properties:
        language:
          type: string
          enum: [de, en]

    QuoteVersion:
      type: object
      required: [id, quoteId, version, totalAmount, discountPct, marginPct, status, createdAt]
      properties:
        id: { type: string }
        quoteId: { type: string }
        version: { type: integer }
        totalAmount: { type: number }
        discountPct: { type: number }
        marginPct: { type: number }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        notes:
          type: ["string", "null"]

    LineItem:
      type: object
      required: [id, quoteVersionId, name, quantity, unitPrice, listPrice, discountPct, total]
      properties:
        id: { type: string }
        quoteVersionId: { type: string }
        name: { type: string }
        description:
          type: ["string", "null"]
        quantity: { type: number }
        unitPrice: { type: number }
        listPrice: { type: number }
        discountPct: { type: number }
        total: { type: number }

    QuoteDetail:
      allOf:
        - $ref: "#/components/schemas/Quote"
        - type: object
          required: [versions, lineItems]
          properties:
            versions:
              type: array
              items: { $ref: "#/components/schemas/QuoteVersion" }
            lineItems:
              type: array
              items: { $ref: "#/components/schemas/LineItem" }

    QuoteVersionInput:
      type: object
      required: [discountPct]
      properties:
        discountPct: { type: number }
        notes: { type: string }

    LineItemInput:
      type: object
      required: [name, quantity, unitPrice, listPrice, discountPct]
      properties:
        name: { type: string }
        description: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        listPrice: { type: number }
        discountPct: { type: number }

    QuoteFromTemplateInput:
      type: object
      required: [dealId, templateId]
      properties:
        dealId: { type: string }
        templateId: { type: string }
        validUntil: { type: string, format: date }
        notes: { type: string }
        attachmentLibraryIds:
          type: array
          items: { type: string }

    QuoteAttachment:
      type: object
      required: [id, quoteVersionId, name, mimeType, size, objectPath, order]
      properties:
        id: { type: string }
        quoteVersionId: { type: string }
        libraryAssetId:
          type: ["string", "null"]
        name: { type: string }
        label:
          type: ["string", "null"]
        mimeType: { type: string }
        size: { type: integer }
        objectPath: { type: string }
        order: { type: integer }
        createdAt: { type: string, format: date-time }

    QuoteAttachmentInput:
      type: object
      properties:
        libraryAssetId: { type: string }
        name: { type: string }
        label: { type: string }
        mimeType: { type: string }
        size: { type: integer }
        objectPath: { type: string }
        order: { type: integer }

    QuoteTemplateSection:
      type: object
      required: [id, kind, title, body, order]
      properties:
        id: { type: string }
        kind: { type: string, description: "cover|intro|scope|terms|appendix|custom" }
        title: { type: string }
        body: { type: string }
        order: { type: integer }

    QuoteTemplateSectionInput:
      type: object
      required: [kind, title]
      properties:
        kind: { type: string }
        title: { type: string }
        body: { type: string }
        order: { type: integer }

    QuoteTemplateLineItem:
      type: object
      required: [name, quantity, unitPrice, listPrice, discountPct]
      properties:
        name: { type: string }
        description: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        listPrice: { type: number }
        discountPct: { type: number }

    QuoteTemplate:
      type: object
      required:
        [
          id, tenantId, name, description, industry, isSystem,
          defaultDiscountPct, defaultMarginPct, defaultValidityDays,
          defaultLineItems, defaultAttachmentLibraryIds, sections, createdAt
        ]
      properties:
        id: { type: string }
        tenantId: { type: string }
        companyId:
          type: ["string", "null"]
        brandId:
          type: ["string", "null"]
        name: { type: string }
        description: { type: string }
        industry: { type: string }
        isSystem: { type: boolean }
        defaultDiscountPct: { type: number }
        defaultMarginPct: { type: number }
        defaultValidityDays: { type: integer }
        defaultLineItems:
          type: array
          items: { $ref: "#/components/schemas/QuoteTemplateLineItem" }
        defaultAttachmentLibraryIds:
          type: array
          items: { type: string }
        sections:
          type: array
          items: { $ref: "#/components/schemas/QuoteTemplateSection" }
        createdAt: { type: string, format: date-time }

    QuoteTemplateInput:
      type: object
      required: [name, industry]
      properties:
        name: { type: string }
        description: { type: string }
        industry: { type: string }
        companyId: { type: string }
        brandId: { type: string }
        defaultDiscountPct: { type: number }
        defaultMarginPct: { type: number }
        defaultValidityDays: { type: integer }
        defaultLineItems:
          type: array
          items: { $ref: "#/components/schemas/QuoteTemplateLineItem" }
        defaultAttachmentLibraryIds:
          type: array
          items: { type: string }
        sections:
          type: array
          items: { $ref: "#/components/schemas/QuoteTemplateSectionInput" }

    AttachmentLibraryItem:
      type: object
      required:
        [
          id, tenantId, name, description, category, tags, mimeType,
          size, objectPath, version, createdAt
        ]
      properties:
        id: { type: string }
        tenantId: { type: string }
        companyId:
          type: ["string", "null"]
        brandId:
          type: ["string", "null"]
        name: { type: string }
        description: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        mimeType: { type: string }
        size: { type: integer }
        objectPath: { type: string }
        version: { type: integer }
        createdBy:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }

    AttachmentLibraryInput:
      type: object
      required: [name, category, mimeType, size, objectPath]
      properties:
        name: { type: string }
        description: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        mimeType: { type: string }
        size: { type: integer }
        objectPath: { type: string }
        companyId: { type: string }
        brandId: { type: string }

    IndustryProfile:
      type: object
      required:
        [
          id, tenantId, industry, label, description, defaultClauseVariants,
          suggestedAttachmentLibraryIds, createdAt
        ]
      properties:
        id: { type: string }
        tenantId: { type: string }
        industry: { type: string }
        label: { type: string }
        description: { type: string }
        defaultClauseVariants:
          type: object
          additionalProperties: { type: string }
        suggestedTemplateId:
          type: ["string", "null"]
        suggestedAttachmentLibraryIds:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    IndustryProfileInput:
      type: object
      required: [industry, label]
      properties:
        industry: { type: string }
        label: { type: string }
        description: { type: string }
        defaultClauseVariants:
          type: object
          additionalProperties: { type: string }
        suggestedTemplateId: { type: string }
        suggestedAttachmentLibraryIds:
          type: array
          items: { type: string }

    # ── Pricing ──
    PricePosition:
      type: object
      required:
        [
          id, sku, name, category, listPrice, currency, status, validFrom,
          brandId, brandName, companyId, companyName, version, isStandard
        ]
      properties:
        id: { type: string }
        sku: { type: string }
        name: { type: string }
        category: { type: string }
        listPrice: { type: number }
        currency: { type: string }
        status: { type: string }
        validFrom: { type: string, format: date }
        validUntil:
          type: ["string", "null"]
          format: date
        brandId: { type: string }
        brandName: { type: string }
        companyId: { type: string }
        companyName: { type: string }
        version: { type: integer }
        isStandard: { type: boolean }

    PricePositionInput:
      type: object
      required: [sku, name, category, listPrice, currency, brandId, companyId, validFrom]
      properties:
        sku: { type: string }
        name: { type: string }
        category: { type: string }
        listPrice: { type: number }
        currency: { type: string }
        brandId: { type: string }
        companyId: { type: string }
        validFrom: { type: string, format: date }

    PricePositionPatch:
      type: object
      properties:
        sku: { type: string }
        name: { type: string }
        category: { type: string }
        listPrice: { type: number }
        currency: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        validFrom: { type: string, format: date }
        validUntil:
          type: ["string", "null"]
          format: date
        brandId: { type: string }
        isStandard: { type: boolean }

    PriceRule:
      type: object
      required: [id, name, scope, condition, effect, priority, status]
      properties:
        id: { type: string }
        name: { type: string }
        scope: { type: string }
        condition: { type: string }
        effect: { type: string }
        priority: { type: integer }
        status: { type: string }

    PriceRuleInput:
      type: object
      required: [name, scope, condition, effect, priority]
      properties:
        name: { type: string }
        scope: { type: string }
        condition: { type: string }
        effect: { type: string }
        priority: { type: integer }
        status: { type: string, enum: [draft, active, archived] }

    PriceRulePatch:
      type: object
      properties:
        name: { type: string }
        scope: { type: string }
        condition: { type: string }
        effect: { type: string }
        priority: { type: integer }
        status: { type: string, enum: [draft, active, archived] }

    PricingSummary:
      type: object
      required:
        [
          totalPositions, activePositions, pendingApprovalCount,
          standardCoveragePct, recentChanges
        ]
      properties:
        totalPositions: { type: integer }
        activePositions: { type: integer }
        pendingApprovalCount: { type: integer }
        standardCoveragePct: { type: number }
        recentChanges:
          type: array
          items:
            type: object
            required: [id, sku, change, at]
            properties:
              id: { type: string }
              sku: { type: string }
              change: { type: string }
              at: { type: string, format: date-time }

    # ── Approvals ──
    ApprovalStage:
      type: object
      required: [order, label, status]
      properties:
        order: { type: integer }
        label: { type: string }
        approverRole:
          type: ["string", "null"]
        approverUserId:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, skipped]
        decidedBy:
          type: ["string", "null"]
        decidedByName:
          type: ["string", "null"]
        decidedAt:
          type: ["string", "null"]
          format: date-time
        delegatedFrom:
          type: ["string", "null"]
          description: "Wenn gesetzt, hat der entscheidende User per Vertretungsregel im Auftrag dieses Users entschieden."
        delegatedFromName:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]

    ApprovalCase:
      type: object
      required:
        [
          id, dealId, dealName, type, reason, requestedBy, requestedByName,
          status, priority, createdAt, impactValue, currency, stages, currentStageIdx
        ]
      properties:
        id: { type: string }
        dealId: { type: string }
        dealName: { type: string }
        type: { type: string }
        reason: { type: string }
        requestedBy: { type: string }
        requestedByName: { type: string }
        status: { type: string }
        priority: { type: string }
        createdAt: { type: string, format: date-time }
        deadline:
          type: ["string", "null"]
          format: date-time
        impactValue: { type: number }
        currency: { type: string }
        decidedAt:
          type: ["string", "null"]
          format: date-time
        decidedBy:
          type: ["string", "null"]
        decisionComment:
          type: ["string", "null"]
        amendmentId:
          type: ["string", "null"]
        chainTemplateId:
          type: ["string", "null"]
        stages:
          type: array
          items: { $ref: "#/components/schemas/ApprovalStage" }
        currentStageIdx: { type: integer }
        canDecide:
          type: boolean
          description: "True wenn der aufrufende User die aktuell offene Stage entscheiden darf (inkl. aktiver Vertretung)."
        canDecideOnBehalfOf:
          type: ["string", "null"]
          description: "Falls canDecide via Vertretung gilt: User-ID, in dessen Auftrag entschieden würde."

    ApprovalDecisionInput:
      type: object
      required: [decision]
      properties:
        decision: { type: string }
        comment: { type: string }

    # ── Approval Chain Templates ──
    ApprovalChainCondition:
      type: object
      required: [field, op, value]
      properties:
        field: { type: string }
        op:
          type: string
          enum: [gt, gte, lt, lte, eq]
        value:
          oneOf:
            - { type: number }
            - { type: string }

    ApprovalChainStageDef:
      type: object
      required: [order, label]
      properties:
        order: { type: integer }
        label: { type: string }
        approverRole:
          type: ["string", "null"]
        approverUserId:
          type: ["string", "null"]

    ApprovalChainTemplate:
      type: object
      required: [id, tenantId, name, triggerType, conditions, stages, priority, active, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        name: { type: string }
        description:
          type: ["string", "null"]
        triggerType: { type: string }
        conditions:
          type: array
          items: { $ref: "#/components/schemas/ApprovalChainCondition" }
        stages:
          type: array
          items: { $ref: "#/components/schemas/ApprovalChainStageDef" }
        priority: { type: integer }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }

    ApprovalChainTemplateInput:
      type: object
      required: [name, triggerType, stages]
      properties:
        name: { type: string }
        description:
          type: ["string", "null"]
        triggerType: { type: string }
        conditions:
          type: array
          items: { $ref: "#/components/schemas/ApprovalChainCondition" }
        stages:
          type: array
          items: { $ref: "#/components/schemas/ApprovalChainStageDef" }
        priority: { type: integer }
        active: { type: boolean }

    # ── User Delegations ──
    UserDelegation:
      type: object
      required: [id, fromUserId, toUserId, validFrom, validUntil, active, createdAt]
      properties:
        id: { type: string }
        fromUserId: { type: string }
        fromUserName:
          type: ["string", "null"]
        toUserId: { type: string }
        toUserName:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
        validFrom: { type: string, format: date-time }
        validUntil: { type: string, format: date-time }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }

    UserDelegationInput:
      type: object
      required: [toUserId, validFrom, validUntil]
      properties:
        toUserId: { type: string }
        reason:
          type: ["string", "null"]
        validFrom: { type: string, format: date-time }
        validUntil: { type: string, format: date-time }

    UserDelegationPatch:
      type: object
      properties:
        toUserId: { type: string }
        reason:
          type: ["string", "null"]
        validFrom: { type: string, format: date-time }
        validUntil: { type: string, format: date-time }
        active: { type: boolean }

    # ── Contracts ──
    Contract:
      type: object
      required:
        [
          id, dealId, dealName, title, status, version, riskLevel, createdAt,
          template, language
        ]
      properties:
        id: { type: string }
        dealId: { type: string }
        dealName: { type: string }
        title: { type: string }
        status: { type: string }
        version: { type: integer }
        riskLevel: { type: string }
        riskScore: { type: integer, description: "0-100 calculated from clause severities" }
        createdAt: { type: string, format: date-time }
        template: { type: string }
        validUntil:
          type: ["string", "null"]
          format: date
        language:
          type: string
          enum: [de, en]
          description: "Sprachfassung des Vertrags. Default ergibt sich aus Brand- bzw. Tenant-Default."
        tenantId:
          type: ["string", "null"]
          description: "Mandanten-Bindung (wird beim Anlegen aus dem Scope gesetzt; bei Altdaten optional)."
        contractTypeId:
          type: ["string", "null"]
          description: "Vertragstyp-Bindung — Voraussetzung für CUAD-Coverage und Tenant-Mappings. Bei neu angelegten Verträgen immer gesetzt (Auswahl oder Heuristik aus Template)."
        predecessorContractId:
          type: ["string", "null"]
          description: "Wenn aus einer Renewal als Folgevertrag erzeugt: id des Vorvertrags."

    ContractInput:
      type: object
      required: [dealId, title, template]
      properties:
        dealId: { type: string }
        title: { type: string }
        template: { type: string }
        brandId:
          type: string
          description: Optional brand whose default clause variants should be applied on creation.
        language:
          type: string
          enum: [de, en]
          description: "Optionale Sprachfassung. NULL/leer → Brand-/Tenant-Default."
        contractTypeId:
          type: string
          description: |
            Vertragstyp-Bindung. Wenn nicht gesetzt, leitet der Server eine Default-Heuristik aus
            `template` ab (z. B. "Master Services Agreement" → MSA). Schlägt die Heuristik fehl,
            antwortet die API mit 422 — der Aufrufer muss dann explizit einen Vertragstyp wählen.

    ContractPatchInput:
      type: object
      properties:
        language:
          type: string
          enum: [de, en]
          description: "Aktualisiert die aktive Sprachfassung des Vertrags."
        contractTypeId:
          type: ["string", "null"]
          description: |
            Setzt oder ersetzt die Vertragstyp-Bindung (z. B. um Altverträge nachträglich an einen
            Vertragstyp zu hängen, damit der CUAD-Check greift). `null` löst die Bindung wieder.

    ContractDetail:
      allOf:
        - $ref: "#/components/schemas/Contract"
        - type: object
          required: [clauses]
          properties:
            clauses:
              type: array
              items: { $ref: "#/components/schemas/ContractClause" }

    ContractClausePatchInput:
      type: object
      properties:
        variantId: { type: string }
        editedName:
          type: ["string", "null"]
          maxLength: 200
          description: "Optional ad-hoc Name. Wenn gesetzt, wird der Wert als Snapshot gespeichert."
        editedSummary:
          type: ["string", "null"]
          maxLength: 1000
        editedBody:
          type: ["string", "null"]
          maxLength: 8000
          description: "Optional ad-hoc Volltext. Liegt der Diff zur aktiven Variante über der Tenant-Schwelle, wird ein Klausel-Vorschlag erzeugt."
        editedReason:
          type: ["string", "null"]
          maxLength: 500
        clearEdits:
          type: boolean
          description: "Setzt vorhandene editedBody/editedName/editedSummary zurück (Variante wird wieder Quelle der Wahrheit)."

    # ── Klausel-Vorschläge (Lernen aus Vertragsarbeit, Task #77) ──
    ClauseSuggestion:
      type: object
      required:
        [
          id,
          tenantId,
          status,
          sourceType,
          proposedName,
          proposedSummary,
          proposedBody,
          contentHash,
          occurrenceCount,
          firstSeenAt,
          lastSeenAt,
        ]
      properties:
        id: { type: string }
        tenantId: { type: string }
        status:
          type: string
          enum: [open, accepted, rejected, superseded]
        sourceType:
          type: string
          enum: [ad-hoc, edit]
        contractId: { type: ["string", "null"] }
        contractClauseId: { type: ["string", "null"] }
        familyId: { type: ["string", "null"] }
        familyName: { type: ["string", "null"] }
        baseVariantId: { type: ["string", "null"] }
        baseVariantName: { type: ["string", "null"] }
        brandId: { type: ["string", "null"] }
        brandName: { type: ["string", "null"] }
        proposedName: { type: string }
        proposedSummary: { type: string }
        proposedBody: { type: string }
        proposedTone: { type: ["string", "null"] }
        proposedSeverity: { type: ["string", "null"] }
        diffPct: { type: ["number", "null"] }
        occurrenceCount: { type: integer }
        contentHash: { type: string }
        authorId: { type: ["string", "null"] }
        authorName: { type: ["string", "null"] }
        firstSeenAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time }
        decisionAt: { type: ["string", "null"], format: date-time }
        decisionBy: { type: ["string", "null"] }
        decisionAction:
          type: ["string", "null"]
          enum: [new_variant, replace_variant, add_translation, discard, null]
        decisionNote: { type: ["string", "null"] }
        createdVariantId: { type: ["string", "null"] }

    ClauseSuggestionDetail:
      allOf:
        - $ref: "#/components/schemas/ClauseSuggestion"
        - type: object
          properties:
            baseVariantBody: { type: ["string", "null"] }
            baseVariantSummary: { type: ["string", "null"] }
            baseVariantTone: { type: ["string", "null"] }
            familyVariants:
              type: array
              items: { $ref: "#/components/schemas/ClauseVariant" }

    ClauseSuggestionInput:
      type: object
      required: [familyId, proposedName, proposedSummary, proposedBody, sourceType]
      properties:
        familyId: { type: string }
        contractId: { type: string, nullable: true }
        contractClauseId: { type: string, nullable: true }
        baseVariantId: { type: string, nullable: true }
        brandId: { type: string, nullable: true }
        proposedName: { type: string, minLength: 1, maxLength: 200 }
        proposedSummary: { type: string, minLength: 1, maxLength: 1000 }
        proposedBody: { type: string, minLength: 1, maxLength: 8000 }
        proposedTone: { type: string, nullable: true, maxLength: 50 }
        proposedSeverity: { type: string, nullable: true, maxLength: 20 }
        sourceType:
          type: string
          enum: [ad-hoc, edit]

    ClauseSuggestionDecisionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [new_variant, replace_variant, add_translation, discard]
        decisionNote: { type: string, nullable: true, maxLength: 500 }
        # Für new_variant
        tone: { type: string, nullable: true, maxLength: 50 }
        severity: { type: string, nullable: true, maxLength: 20 }
        severityScore: { type: integer, nullable: true, minimum: 1, maximum: 5 }
        # Für replace_variant
        replaceVariantId: { type: string, nullable: true }
        # Für add_translation
        locale:
          type: string
          nullable: true
          enum: [de, en]
        translationVariantId: { type: string, nullable: true }

    ClauseSuggestionConfig:
      type: object
      required: [diffThresholdPct, repeatThreshold]
      properties:
        diffThresholdPct:
          type: integer
          minimum: 0
          maximum: 100
        repeatThreshold:
          type: integer
          minimum: 1
          maximum: 100

    ClauseSuggestionStats:
      type: object
      required: [open, accepted, rejected, total, byFamily, byAction, since]
      properties:
        open: { type: integer }
        accepted: { type: integer }
        rejected: { type: integer }
        total: { type: integer }
        since: { type: string, format: date-time }
        byFamily:
          type: array
          items:
            type: object
            required: [familyId, familyName, open, accepted, rejected]
            properties:
              familyId: { type: string }
              familyName: { type: string }
              open: { type: integer }
              accepted: { type: integer }
              rejected: { type: integer }
        byAction:
          type: object
          additionalProperties:
            type: integer

    ClauseVariant:
      type: object
      required: [id, name, severity, severityScore, summary, body, tone]
      properties:
        id: { type: string }
        name: { type: string }
        severity: { type: string }
        severityScore: { type: integer }
        summary: { type: string }
        body: { type: string }
        tone: { type: string }
        translations:
          type: array
          description: "Vorhandene Sprachfassungen je Variante (de/en/…)."
          items: { $ref: "#/components/schemas/ClauseVariantTranslation" }

    ClauseVariantTranslation:
      type: object
      required: [id, variantId, locale, name, summary, body, createdAt, updatedAt]
      properties:
        id: { type: string }
        variantId: { type: string }
        locale:
          type: string
          enum: [de, en]
        name: { type: string }
        summary: { type: string }
        body: { type: string }
        source: { type: string, nullable: true, description: "z. B. bonterms-mutual-2024" }
        license: { type: string, nullable: true, description: "z. B. CC-BY-4.0" }
        sourceUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ClauseVariantTranslationUpsert:
      type: object
      required: [name, summary, body]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        summary: { type: string, minLength: 1, maxLength: 1000 }
        body: { type: string, maxLength: 8000 }
        source: { type: string, nullable: true, maxLength: 200 }
        license: { type: string, nullable: true, maxLength: 200 }
        sourceUrl: { type: string, nullable: true, maxLength: 1000 }

    ClauseFamily:
      type: object
      required: [id, name, description, variants]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        variants:
          type: array
          items: { $ref: "#/components/schemas/ClauseVariant" }

    ContractClause:
      type: object
      required: [id, contractId, family, variant, severity, summary, severityScore, tone, body]
      properties:
        id: { type: string }
        contractId: { type: string }
        family: { type: string }
        variant: { type: string }
        severity: { type: string }
        summary: { type: string }
        familyId: { type: ["string", "null"] }
        activeVariantId: { type: ["string", "null"] }
        severityScore: { type: integer }
        tone: { type: string }
        body: { type: string }
        translationLocale:
          type: string
          enum: [de, en]
          description: "Locale, in der die Klausel aktuell ausgeliefert wird."
        translationMissing:
          type: boolean
          description: "true, wenn für die Vertragssprache keine Übersetzung gepflegt ist und auf die Quell-Sprache zurückgefallen wurde."
        edited:
          type: boolean
          description: "true, wenn der Slot ad-hoc editiert wurde und vom aktiven Variantentext abweicht."
        editedReason:
          type: ["string", "null"]
          description: "Begründung der Bearbeitenden für die Ad-hoc-Anpassung (optional)."
        editedAt:
          type: ["string", "null"]
          format: date-time
        editedBy:
          type: ["string", "null"]

    ClauseDiff:
      type: object
      required: [from, to, deltaScore, softer, approvalRequired]
      properties:
        from: { $ref: "#/components/schemas/ClauseVariant" }
        to: { $ref: "#/components/schemas/ClauseVariant" }
        deltaScore: { type: integer }
        softer: { type: boolean }
        approvalRequired: { type: boolean }

    ClauseChangeResult:
      type: object
      required: [clause, contractRiskLevel, contractRiskScore, deltaScore, softer]
      properties:
        clause: { $ref: "#/components/schemas/ContractClause" }
        contractRiskLevel: { type: string }
        contractRiskScore: { type: integer }
        dealName: { type: string }
        deltaScore: { type: integer }
        softer: { type: boolean }
        approvalId: { type: ["string", "null"] }
        approvalReason: { type: ["string", "null"] }

    AddClauseResult:
      type: object
      required: [clause, contractRiskLevel, contractRiskScore]
      properties:
        clause: { $ref: "#/components/schemas/ContractClause" }
        contractRiskLevel: { type: string }
        contractRiskScore: { type: integer }
        dealName: { type: string }

    # ── Amendments ──
    ContractAmendment:
      type: object
      required: [id, originalContractId, number, type, title, status, createdAt]
      properties:
        id: { type: string }
        originalContractId: { type: string }
        number: { type: string }
        type: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        status: { type: string }
        effectiveFrom: { type: ["string", "null"] }
        createdBy: { type: ["string", "null"] }
        createdAt: { type: string }

    AmendmentClauseChange:
      type: object
      required: [id, amendmentId, operation, family]
      properties:
        id: { type: string }
        amendmentId: { type: string }
        operation: { type: string }
        family: { type: string }
        familyId: { type: ["string", "null"] }
        beforeVariantId: { type: ["string", "null"] }
        afterVariantId: { type: ["string", "null"] }
        beforeSummary: { type: ["string", "null"] }
        afterSummary: { type: ["string", "null"] }
        severity: { type: ["string", "null"] }

    ContractAmendmentDetail:
      allOf:
        - $ref: "#/components/schemas/ContractAmendment"
        - type: object
          required: [changes]
          properties:
            changes:
              type: array
              items: { $ref: "#/components/schemas/AmendmentClauseChange" }

    CreateAmendmentInput:
      type: object
      required: [type, title]
      properties:
        type: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        effectiveFrom: { type: ["string", "null"] }
        changes:
          type: array
          items:
            type: object
            required: [family, operation]
            properties:
              family: { type: string }
              familyId: { type: ["string", "null"] }
              operation: { type: string }
              beforeVariantId: { type: ["string", "null"] }
              afterVariantId: { type: ["string", "null"] }
              beforeSummary: { type: ["string", "null"] }
              afterSummary: { type: ["string", "null"] }
              severity: { type: ["string", "null"] }

    PatchAmendmentInput:
      type: object
      properties:
        status: { type: string }
        effectiveFrom: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        title: { type: string }

    EffectiveContractState:
      type: object
      required: [contractId, clauses, appliedAmendments]
      properties:
        contractId: { type: string }
        clauses:
          type: array
          items: { $ref: "#/components/schemas/ContractClause" }
        appliedAmendments:
          type: array
          items: { $ref: "#/components/schemas/ContractAmendment" }

    # ── Negotiations ──
    Negotiation:
      type: object
      required:
        [
          id, dealId, dealName, status, round, lastReactionType, updatedAt,
          riskLevel
        ]
      properties:
        id: { type: string }
        dealId: { type: string }
        dealName: { type: string }
        status: { type: string }
        round: { type: integer }
        lastReactionType: { type: string }
        updatedAt: { type: string, format: date-time }
        riskLevel: { type: string }

    NegotiationDetail:
      allOf:
        - $ref: "#/components/schemas/Negotiation"
        - type: object
          required: [reactions, timeline, impacts]
          properties:
            reactions:
              type: array
              items: { $ref: "#/components/schemas/CustomerReaction" }
            timeline:
              type: array
              items: { $ref: "#/components/schemas/TimelineEvent" }
            impacts:
              type: array
              items: { $ref: "#/components/schemas/NegotiationImpact" }
            baseline:
              oneOf:
                - $ref: "#/components/schemas/NegotiationBaseline"
                - type: "null"

    CustomerReaction:
      type: object
      required: [id, negotiationId, type, topic, summary, source, createdAt, priority]
      properties:
        id: { type: string }
        negotiationId: { type: string }
        type: { type: string }
        topic: { type: string }
        summary: { type: string }
        source: { type: string }
        createdAt: { type: string, format: date-time }
        priority: { type: string }
        impactPct: { type: ["number", "null"] }
        priceDeltaPct: { type: ["number", "null"] }
        termMonthsDelta: { type: ["integer", "null"] }
        paymentTermsDeltaDays: { type: ["integer", "null"] }
        requestedClauseVariantId: { type: ["string", "null"] }
        linkedQuoteVersionId: { type: ["string", "null"] }
        linkedApprovalId: { type: ["string", "null"] }

    ReactionInput:
      type: object
      required: [type, topic, summary, source, priority]
      properties:
        type: { type: string }
        topic: { type: string }
        summary: { type: string }
        source: { type: string }
        priority: { type: string }
        impactPct: { type: number }
        priceDeltaPct: { type: number }
        termMonthsDelta: { type: integer }
        paymentTermsDeltaDays: { type: integer }
        requestedClauseVariantId: { type: string }

    ApprovalFromReactionInput:
      type: object
      properties:
        type: { type: string }
        reason: { type: string }
        priority: { type: string }

    RequestContractApprovalInput:
      type: object
      description: >
        Optionaler Body. Ohne `override` läuft die normale Vorprüfung —
        fehlende Pflicht-CUAD-Kategorien sperren die Anfrage. Mit
        `override: true` plus `overrideReason` (≥10 Zeichen) kann ein
        Tenant-Admin den Block bewusst umgehen; der Override wird im
        Audit-Log strukturiert protokolliert.
      properties:
        override:
          type: boolean
          default: false
        overrideReason:
          type: string
          minLength: 10
          description: Pflichttext, wenn override=true.
        priority:
          type: string
          enum: [low, medium, high]
        reason:
          type: string
          description: Optionaler Begründungstext für die Approval (sonst auto-generiert).

    CounterproposalInput:
      type: object
      required: [topic, summary, source]
      properties:
        topic: { type: string }
        summary: { type: string }
        source: { type: string }
        priority: { type: string }
        priceDeltaPct: { type: number }
        termMonthsDelta: { type: integer }
        paymentTermsDeltaDays: { type: integer }
        requestedClauseVariantId: { type: string }
        createNewVersion: { type: boolean }

    NegotiationImpact:
      type: object
      required: [reactionId, followUps, approvalsTriggered, riskTrend]
      properties:
        reactionId: { type: string }
        priceDeltaPct: { type: ["number", "null"] }
        newTotalAmount: { type: ["number", "null"] }
        newDiscountPct: { type: ["number", "null"] }
        newMarginPct: { type: ["number", "null"] }
        marginDeltaPct: { type: ["number", "null"] }
        termMonthsDelta: { type: ["integer", "null"] }
        paymentTermsDeltaDays: { type: ["integer", "null"] }
        requestedClauseVariantId: { type: ["string", "null"] }
        linkedQuoteVersionId: { type: ["string", "null"] }
        linkedApprovalId: { type: ["string", "null"] }
        followUps:
          type: array
          items: { type: string }
        approvalsTriggered:
          type: array
          items:
            type: object
            required: [type, reason]
            properties:
              type: { type: string }
              reason: { type: string }
        riskTrend:
          type: string
          enum: [up, down, flat]

    NegotiationBaseline:
      type: object
      required: [totalAmount, discountPct, marginPct]
      properties:
        totalAmount: { type: number }
        discountPct: { type: number }
        marginPct: { type: number }

    NegotiationImpactResponse:
      type: object
      required: [negotiationId, approvalThresholdPct, impacts]
      properties:
        negotiationId: { type: string }
        approvalThresholdPct: { type: number }
        baseline:
          oneOf:
            - $ref: "#/components/schemas/NegotiationBaseline"
            - type: "null"
        impacts:
          type: array
          items: { $ref: "#/components/schemas/NegotiationImpact" }

    # ── Signatures ──
    SignaturePackage:
      type: object
      required:
        [
          id, dealId, dealName, title, status, mode, signedCount, totalSigners,
          createdAt
        ]
      properties:
        id: { type: string }
        dealId: { type: string }
        dealName: { type: string }
        title: { type: string }
        status: { type: string, enum: [draft, in_progress, completed, blocked] }
        mode: { type: string, enum: [sequential, parallel] }
        signedCount: { type: integer }
        totalSigners: { type: integer }
        createdAt: { type: string, format: date-time }
        deadline:
          type: ["string", "null"]
          format: date-time
        amendmentId:
          type: ["string", "null"]

    Signer:
      type: object
      required: [id, packageId, name, email, role, order, status, isFallback]
      properties:
        id: { type: string }
        packageId: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        order: { type: integer }
        status:
          type: string
          enum: [pending, sent, viewed, signed, declined]
        isFallback: { type: boolean }
        sentAt: { type: ["string", "null"], format: date-time }
        viewedAt: { type: ["string", "null"], format: date-time }
        signedAt: { type: ["string", "null"], format: date-time }
        declinedAt: { type: ["string", "null"], format: date-time }
        declineReason: { type: ["string", "null"] }
        lastReminderAt: { type: ["string", "null"], format: date-time }

    SignaturePackageDetail:
      allOf:
        - $ref: "#/components/schemas/SignaturePackage"
        - type: object
          required:
            [
              signers, mode, reminderIntervalHours, escalationAfterHours
            ]
          properties:
            signers:
              type: array
              items: { $ref: "#/components/schemas/Signer" }
            reminderIntervalHours: { type: integer }
            escalationAfterHours: { type: integer }
            lastReminderAt: { type: ["string", "null"], format: date-time }
            orderConfirmationId: { type: ["string", "null"] }
            waitingOnSignerId: { type: ["string", "null"] }
            waitingOnSignerName: { type: ["string", "null"] }
            waitingSinceHours: { type: ["integer", "null"] }
            nextReminderAt: { type: ["string", "null"], format: date-time }
            escalationAt: { type: ["string", "null"], format: date-time }

    EscalateSignatureInput:
      type: object
      required: [fallbackName, fallbackEmail]
      properties:
        fallbackName: { type: string }
        fallbackEmail: { type: string }
        fallbackRole: { type: string }
        replacesSignerId: { type: string }

    DeclineSignerInput:
      type: object
      properties:
        reason: { type: string }

    # ── Price Increases ──
    PriceIncreaseCampaign:
      type: object
      required:
        [
          id, name, status, effectiveDate, accountsCount, totalUplift, currency,
          createdAt, acceptedCount, pendingCount, rejectedCount
        ]
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string }
        effectiveDate: { type: string, format: date }
        accountsCount: { type: integer }
        totalUplift: { type: number }
        currency: { type: string }
        createdAt: { type: string, format: date-time }
        acceptedCount: { type: integer }
        pendingCount: { type: integer }
        rejectedCount: { type: integer }
        averageUpliftPct: { type: number }

    PriceIncreaseLetter:
      type: object
      required: [id, campaignId, accountId, accountName, status, upliftPct, sentAt]
      properties:
        id: { type: string }
        campaignId: { type: string }
        accountId: { type: string }
        accountName: { type: string }
        status: { type: string }
        upliftPct: { type: number }
        sentAt:
          type: ["string", "null"]
          format: date-time
        respondedAt:
          type: ["string", "null"]
          format: date-time

    PriceIncreaseCampaignDetail:
      allOf:
        - $ref: "#/components/schemas/PriceIncreaseCampaign"
        - type: object
          required: [letters]
          properties:
            letters:
              type: array
              items: { $ref: "#/components/schemas/PriceIncreaseLetter" }

    # ── Reports ──
    DashboardSummary:
      type: object
      required:
        [
          openDealsCount, openDealsValue, currency, winRatePct, avgCycleDays,
          quotesAwaitingResponse, openApprovals, signaturesPending,
          atRiskDeals, stageBreakdown, recentEvents
        ]
      properties:
        openDealsCount: { type: integer }
        openDealsValue: { type: number }
        currency: { type: string }
        winRatePct: { type: number }
        avgCycleDays: { type: number }
        quotesAwaitingResponse: { type: integer }
        openApprovals: { type: integer }
        signaturesPending: { type: integer }
        atRiskDeals: { type: integer }
        openDeviationsCount: { type: integer, description: "Offene Klausel-Abweichungen im sichtbaren Scope" }
        overdueObligationsCount: { type: integer, description: "Überfällige Vertragspflichten" }
        avgTimeToSignatureDays: { type: number, nullable: true, description: "ø Tage von Vertragserstellung bis Signatur (90d Rolling)" }
        avgApprovalDurationHours: { type: number, nullable: true, description: "ø Stunden von Approval-Antrag bis Entscheidung" }
        stageBreakdown:
          type: array
          items:
            type: object
            required: [stage, label, count, value]
            properties:
              stage: { type: string }
              label: { type: string }
              count: { type: integer }
              value: { type: number }
        recentEvents:
          type: array
          items: { $ref: "#/components/schemas/TimelineEvent" }

    PerformanceReport:
      type: object
      required: [winRatePct, avgDiscountPct, avgCycleDays, marginDisciplinePct, monthly, byOwner]
      properties:
        winRatePct: { type: number }
        avgDiscountPct: { type: number }
        avgCycleDays: { type: number }
        marginDisciplinePct: { type: number }
        monthly:
          type: array
          items:
            type: object
            required: [month, won, lost, value]
            properties:
              month: { type: string }
              won: { type: integer }
              lost: { type: integer }
              value: { type: number }
        byOwner:
          type: array
          items:
            type: object
            required: [ownerId, ownerName, deals, value, winRatePct]
            properties:
              ownerId: { type: string }
              ownerName: { type: string }
              deals: { type: integer }
              value: { type: number }
              winRatePct: { type: number }

    ForecastReport:
      type: object
      required: [currency, months]
      properties:
        currency: { type: string }
        months:
          type: array
          items:
            type: object
            required: [month, committed, bestCase, pipeline]
            properties:
              month: { type: string }
              committed: { type: number }
              bestCase: { type: number }
              pipeline: { type: number }

    # ── Copilot ──
    ListCopilotInsightsResponse:
      type: object
      required: [items, scopeRestricted, emptyReason]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CopilotInsight" }
        # True when the caller is a non-tenantWide ("restricted") user, OR
        # when an active scope filter is applied. The frontend uses this to
        # decide whether the empty-state hint applies.
        scopeRestricted:
          type: boolean
        # Why `items` is empty for restricted users. Allows the UI to render
        # an explanatory empty-state instead of a generic "no data" message.
        #   scope_empty                  — user has no companies/brands at all
        #   scope_filter_excludes_all    — user has access, but the active
        #                                  scope filter excludes every deal
        #   null                         — no scope-related explanation
        emptyReason:
          type: ["string", "null"]
          enum: [scope_empty, scope_filter_excludes_all, null]

