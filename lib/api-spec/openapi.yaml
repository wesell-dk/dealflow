  # ───────────── EXTERNAL CONTRACTS (Bestandsverträge) ─────────────

  /external-contracts/upload-url:
    post:
      operationId: requestExternalContractUploadUrl
      tags: [external-contracts]
      summary: Signed PUT-URL für PDF/DOCX-Upload (max 20 MB)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExternalContractUploadUrlRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalContractUploadUrlResponse" }
        "400": { description: invalid mime/size }

  /external-contracts/extract:
    post:
      operationId: extractExternalContractFields
      tags: [external-contracts]
      summary: KI-Extraktion der Kerndaten aus einem hochgeladenen Dokument
      description: |
        Lädt das Dokument aus Object-Storage, extrahiert den Text-Layer (PDF
        oder DOCX) und ruft die Extraktions-AI auf. Persistiert NICHT — der
        User bestätigt im Frontend und ruft danach POST /external-contracts.
        Bei Provider-/Config-Fehler liefert der Endpoint 200 mit
        `aiAvailable=false` und einer leeren Suggestion, damit das Frontend
        manuell weitergehen kann.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExternalContractExtractRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalContractExtractResponse" }
        "400": { description: invalid request / unreadable file }
        "404": { description: object not found }

  /external-contracts:
    get:
      operationId: listExternalContracts
      tags: [external-contracts]
      summary: Bestandsverträge auflisten (Brand-Scope-konform)
      parameters:
        - in: query
          name: accountId
          required: false
          schema: { type: string }
        - in: query
          name: brandId
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExternalContract" }
    post:
      operationId: createExternalContract
      tags: [external-contracts]
      summary: Bestandsvertrag persistieren (nach User-Bestätigung)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExternalContractCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalContract" }
        "400": { description: invalid input }
        "403": { description: forbidden / scope }

  /external-contracts/{id}:
    get:
      operationId: getExternalContract
      tags: [external-contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalContractDetail" }
        "404": { description: not found }
    patch:
      operationId: updateExternalContract
      tags: [external-contracts]
      summary: Felder eines Bestandsvertrags korrigieren (Audit pro Änderung)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExternalContractPatch" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalContract" }
        "404": { description: not found }
    delete:
      operationId: deleteExternalContract
      tags: [external-contracts]
      summary: Bestandsvertrag und Object-Storage-Datei löschen
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: deleted }
        "404": { description: not found }

  /clause-imports/upload-url:
    post:
      operationId: requestClauseImportUploadUrl
      tags: [clause-imports]
      summary: Signed PUT-URL fuer PDF/DOCX-Upload (max 20 MB, Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClauseImportUploadUrlRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClauseImportUploadUrlResponse" }
        "400": { description: invalid mime/size }
        "403": { description: admin rights required }

  /clause-imports:
    get:
      operationId: listClauseImports
      tags: [clause-imports]
      summary: Klausel-Import-Jobs auflisten (Admin only)
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [extracting, processing, awaiting_review, completed, failed]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClauseImportJob" }
        "403": { description: admin rights required }
    post:
      operationId: createClauseImport
      tags: [clause-imports]
      summary: Klausel-Import-Job anlegen, Text extrahieren und KI-Segmentierung starten
      description: |
        Synchron: laedt das Dokument aus Object-Storage, extrahiert Text,
        ruft die Segmentierungs-AI auf und persistiert Job + Suggestions.
        Suggestions sind initial im Status `pending_review`. Wenn Text- oder
        AI-Extraktion fehlschlaegt, wird der Job mit status=`failed` und
        einer errorMessage angelegt — der Aufrufer kann ihn dann loeschen
        oder das Dokument neu hochladen.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClauseImportCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClauseImportJobDetail" }
        "400": { description: invalid input }
        "403": { description: admin rights required }

  /clause-imports/{id}:
    get:
      operationId: getClauseImport
      tags: [clause-imports]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClauseImportJobDetail" }
        "403": { description: admin rights required }
        "404": { description: not found }
    delete:
      operationId: deleteClauseImport
      tags: [clause-imports]
      summary: Job + Object-Storage-Datei + Suggestions loeschen
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: deleted }
        "403": { description: admin rights required }
        "404": { description: not found }

  /clause-imports/{id}/suggestions/{sid}:
    patch:
      operationId: decideClauseImportSuggestion
      tags: [clause-imports]
      summary: Suggestion akzeptieren (→Variante anlegen) oder verwerfen
      description: |
        decision=accept → erstellt eine neue clauseVariant in der gewaehlten
          Familie ODER eine Translation auf einer existierenden Variante,
          je nach Job-Sprache (de=Basis, en=Translation). Wenn
          targetVariantId gesetzt ist, wird stattdessen eine Translation
          fuer diese Variante angelegt (auch bei language=de).
        decision=reject → markiert die Suggestion als verworfen, ohne
          eine Variante anzulegen.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: sid
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClauseImportSuggestionDecision" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClauseImportJobDetail" }
        "400": { description: invalid input }
        "403": { description: admin rights required }
        "404": { description: not found }

  /renewals:
    get:
      operationId: listRenewals
      tags: [renewals]
      summary: Renewal-Opportunities auflisten (Brand-Scope-konform)
      parameters:
        - in: query
          name: bucket
          required: false
          schema: { type: string, enum: [this_month, next_90, risk] }
        - in: query
          name: minRisk
          required: false
          schema: { type: integer, minimum: 0, maximum: 100 }
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [open, in_progress, snoozed, won, lost, cancelled] }
        - in: query
          name: accountId
          required: false
          schema: { type: string }
        - in: query
          name: brandId
          required: false
          schema: { type: string }
        - in: query
          name: dueYm
          required: false
          description: "Filter auf dueDate = exakt YYYY-MM (Drill-down aus Trendchart)."
          schema: { type: string, pattern: "^\\d{4}-\\d{2}$" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RenewalOpportunity" }

  /renewals/_summary:
    get:
      operationId: getRenewalSummary
      tags: [renewals]
      summary: KPI für Renewal-Pipeline (offene Opps, Pipeline-Wert, Buckets)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenewalSummary" }

  /renewals/_trend:
    get:
      operationId: getRenewalTrend
      tags: [renewals]
      summary: Renewal-Pipeline pro Monat (Volumen & Anzahl) für Reports-Trendchart
      parameters:
        - in: query
          name: horizonMonths
          required: false
          schema: { type: integer, minimum: 1, maximum: 36, default: 12 }
        - in: query
          name: groupBy
          required: false
          description: |
            Optionale Aufschlüsselung pro Monats-Bucket. Mehrere Werte
            kommasepariert (z. B. `brand,owner`). `none` (Default) liefert
            nur die Gesamt-Aggregate, ohne `byBrand` / `byOwner`.
          schema:
            type: string
            enum: [none, brand, owner, "brand,owner", "owner,brand"]
            default: none
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RenewalTrendBucket" }

  /renewals/run:
    post:
      operationId: runRenewalEngine
      tags: [renewals]
      summary: Renewal-Engine sofort materialisieren (Tenant-Admin)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenewalRunResult" }
        "403": { description: tenant admin required }

  /renewals/{id}:
    get:
      operationId: getRenewal
      tags: [renewals]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenewalOpportunity" }
        "404": { description: not found }
    patch:
      operationId: updateRenewal
      tags: [renewals]
      summary: Status ändern (snooze, won, lost, cancelled), Notizen
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RenewalPatch" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenewalOpportunity" }
        "404": { description: not found }

  /renewals/{id}/issue-followup:
    post:
      operationId: issueRenewalFollowup
      tags: [renewals]
      summary: Folgevertrag-Draft aus einer offenen Renewal anlegen
      description: |
        Legt einen neuen `contracts`-Datensatz im Status `drafting` an, der
        Brand, Klausel-Set und (optionale) Quote-Vorlage des Vorvertrags
        übernimmt. Der neue Vertrag verweist über `predecessorContractId`
        auf den Vorvertrag, die Renewal wechselt auf Status `in_progress`.
        Sobald der Folgevertrag signiert wird, wird die Renewal automatisch
        auf `won` geschaltet.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenewalFollowupResult" }
        "404": { description: not found }
        "409": { description: renewal not eligible (status != open or already issued) }

  /renewals/{id}/notify-owner:
    post:
      operationId: notifyRenewalOwner
      tags: [renewals]
      summary: Account-Manager:in über das Renewal benachrichtigen
      description: >-
        Schickt eine Renewal-Erinnerung an die für den Account zuständige
        Person. Owner wird aus account.ownerId aufgelöst (Fallback:
        contract.salesOwnerId). Wir schreiben Timeline-Event + Audit-Eintrag.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenewalNotifyResult" }
        "404": { description: not found }
        "422": { description: no owner assigned }

  /renewals/_bulk:
    post:
      operationId: bulkRenewalAction
      tags: [renewals]
      summary: Sammelaktion auf mehrere Renewals (snooze/notify/Status)
      description: >-
        Wendet dieselbe Aktion auf mehrere sichtbare Renewals an. Renewals
        außerhalb des Sichtbarkeits-Scope landen in skippedIds und blockieren
        die Aktion nicht. action='snooze' verlangt snoozedUntil.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RenewalBulkInput" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenewalBulkResult" }
        "400": { description: invalid request }
        "422": { description: missing parameters }


  /brands/{brandId}/clause-overrides:
    get:
      operationId: listBrandClauseOverrides
      tags: [clauses]
      summary: Brand-spezifische Klausel-Overrides auflisten
      parameters:
        - in: path
          name: brandId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BrandClauseOverride" }
        "403": { description: forbidden }
        "404": { description: brand not found }

  /brands/{brandId}/clause-overrides/{baseVariantId}:
    put:
      operationId: upsertBrandClauseOverride
      tags: [clauses]
      summary: Brand-Override für eine System-Variante anlegen oder aktualisieren (Tenant-Admin)
      parameters:
        - in: path
          name: brandId
          required: true
          schema: { type: string }
        - in: path
          name: baseVariantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BrandClauseOverridePatch" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrandClauseOverride" }
        "400": { description: invalid }
        "403": { description: tenant admin required }
        "404": { description: brand not found }
    delete:
      operationId: deleteBrandClauseOverride
      tags: [clauses]
      summary: Brand-Override entfernen (Tenant-Admin)
      parameters:
        - in: path
          name: brandId
          required: true
          schema: { type: string }
        - in: path
          name: baseVariantId
          required: true
          schema: { type: string }
      responses:
        "204": { description: ok }
        "403": { description: tenant admin required }
        "404": { description: not found }

  /clause-compatibility:
    get:
      operationId: listClauseCompatibility
      tags: [clauses]
      summary: Kompatibilitäts-Regeln zwischen Klausel-Varianten auflisten
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClauseCompatibilityRule" }
    post:
      operationId: createClauseCompatibility
      tags: [clauses]
      summary: Kompatibilitäts-Regel anlegen (Tenant-Admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClauseCompatibilityCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClauseCompatibilityRule" }
        "400": { description: invalid }
        "403": { description: tenant admin required }
        "409": { description: duplicate }

  /clause-compatibility/{id}:
    delete:
      operationId: deleteClauseCompatibility
      tags: [clauses]
      summary: Kompatibilitäts-Regel entfernen (Tenant-Admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: ok }
        "403": { description: tenant admin required }
        "404": { description: not found }

  /contracts/{id}/clauses/_compatibility:
    get:
      operationId: getContractClauseCompatibility
      tags: [contracts]
      summary: Kompatibilitäts-Report für alle Klauseln eines Vertrags
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContractCompatibilityReport" }
        "403": { description: forbidden }
        "404": { description: not found }

  /contracts/{id}/external-collaborators:
    get:
      operationId: listExternalCollaborators
      tags: [external-collaborators]
      summary: Externe Mitwirkende eines Vertrags auflisten
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExternalCollaborator" }
        "403": { description: forbidden }
        "404": { description: contract not found }
    post:
      operationId: createExternalCollaborator
      tags: [external-collaborators]
      summary: Magic-Link für externen Mitwirkenden erstellen (Plaintext-Token nur einmalig zurückgegeben)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExternalCollaboratorCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalCollaborator" }
        "400": { description: invalid }
        "403": { description: forbidden }
        "404": { description: contract not found }
        "409": { description: already exists }

  /external-collaborators/{id}:
    get:
      operationId: getExternalCollaborator
      tags: [external-collaborators]
      summary: Einzelnen Magic-Link-Mitwirkenden inkl. zugehoerigem Vertrag abrufen
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalCollaborator" }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      operationId: revokeExternalCollaborator
      tags: [external-collaborators]
      summary: Magic-Link widerrufen
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalCollaborator" }
        "403": { description: forbidden }
        "404": { description: not found }

  /external-collaborators/{id}/events:
    get:
      operationId: listExternalCollaboratorEvents
      tags: [external-collaborators]
      summary: Chronologische Aktivitaeten eines Magic-Links (created/viewed/commented/edited_fields/revoked/expired_attempt)
