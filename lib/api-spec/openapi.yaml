          type: string
          enum: [zart, moderat, standard, streng, hart]
        suggestedSeverity:
          type: string
          enum: [low, medium, high]
        suggestedFamilyId: { type: ["string", "null"] }
        suggestedFamilyName: { type: ["string", "null"] }
        matchedVariantId: { type: ["string", "null"] }
        matchedVariantName: { type: ["string", "null"] }
