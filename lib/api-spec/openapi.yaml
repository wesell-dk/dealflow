    # ansprechen. `confidence` ist der numerische Score (0..1) nach Mapping
    # über `confidenceLevelToScore`; `confidenceLevel` und `confidenceReason`
    # speisen das AIConfidenceBadge.
    CopilotAiRecommendationRef:
      type: object
      required: [recommendationId, confidence, confidenceLevel, confidenceReason]
      properties:
