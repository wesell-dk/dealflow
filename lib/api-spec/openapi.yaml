      properties:
        id: { type: string }
        tenantId: { type: string }
        # Genau einer von contractId / externalContractId ist gesetzt.
        # `kind` zeigt der UI direkt, welche Verlinkung sie wählen muss.
        contractId: { type: ["string", "null"] }
        contractTitle: { type: ["string", "null"] }
        externalContractId: { type: ["string", "null"] }
        externalContractTitle: { type: ["string", "null"] }
        kind:
          type: string
          enum: [internal, external]
        accountId: { type: string }
        accountName: { type: ["string", "null"] }
        brandId: { type: ["string", "null"] }
        brandName: { type: ["string", "null"] }
        dueDate: { type: string, format: date }
        noticeDeadline: { type: string, format: date }
        riskScore: { type: integer, minimum: 0, maximum: 100 }
        riskFactors:
          type: array
          items: { $ref: "#/components/schemas/RenewalRiskFactor" }
        status:
          type: string
          enum: [open, in_progress, snoozed, won, lost, cancelled]
        valueAmount: { type: ["number", "null"] }
        currency: { type: ["string", "null"] }
        snoozedUntil: { type: ["string", "null"], format: date }
        decidedAt: { type: ["string", "null"], format: date-time }
        decidedBy: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        followupContractId:
          type: ["string", "null"]
          description: "Folgevertrag-Draft, sobald er aus dieser Renewal erzeugt wurde."
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    RenewalPatch:
      type: object
      properties:
        status:
          type: string
          enum: [open, in_progress, snoozed, won, lost, cancelled]
        snoozedUntil: { type: ["string", "null"], format: date }
        notes: { type: ["string", "null"] }

    RenewalFollowupResult:
      type: object
      required: [renewal, contract]
      properties:
        renewal: { $ref: "#/components/schemas/RenewalOpportunity" }
        contract: { $ref: "#/components/schemas/Contract" }

    RenewalRunResult:
      type: object
      required: [scanned, created, updated, dueSoon, skipped]
      properties:
        scanned: { type: integer }
        created: { type: integer }
        updated: { type: integer }
        dueSoon: { type: integer }
        skipped: { type: integer }

    RenewalBucketStat:
      type: object
      required: [count, value]
      properties:
        count: { type: integer }
        value: { type: number }

    RenewalSummary:
      type: object
      required: [totalOpen, pipelineValue, thisMonth, next90, atRisk]
      properties:
        totalOpen: { type: integer }
        pipelineValue: { type: number }
        thisMonth: { $ref: "#/components/schemas/RenewalBucketStat" }
        next90: { $ref: "#/components/schemas/RenewalBucketStat" }
        atRisk: { $ref: "#/components/schemas/RenewalBucketStat" }

    RenewalTrendBucket:
      type: object
      required: [ym, count, value, atRiskCount, atRiskValue]
      properties:
        ym: { type: string, description: "Monat im Format YYYY-MM" }
        count: { type: integer, description: "Anzahl offener Renewals mit dueDate in diesem Monat" }
        value: { type: number, description: "Summe valueAmount in EUR" }
        atRiskCount: { type: integer, description: "Anzahl mit riskScore >= 70" }
        atRiskValue: { type: number, description: "Summe valueAmount mit riskScore >= 70" }
        byBrand:
          type: array
          description: |
            Optional. Aufschlüsselung des Buckets nach Brand, sortiert nach
            `value` absteigend. Nur gesetzt, wenn `groupBy` `brand` enthält.
            Renewals ohne Brand erscheinen mit `brandId: null`.
          items: { $ref: "#/components/schemas/RenewalTrendBreakdown" }
        byOwner:
          type: array
          description: |
            Optional. Aufschlüsselung des Buckets nach Account-Owner (Owner
            des zugrundeliegenden Vertrags-Deals), sortiert nach `value`
            absteigend. Nur gesetzt, wenn `groupBy` `owner` enthält.
            Renewals ohne auflösbaren Owner erscheinen mit `ownerId: null`.
          items: { $ref: "#/components/schemas/RenewalTrendBreakdown" }

    RenewalTrendBreakdown:
      type: object
      required: [name, value, count, atRiskCount, atRiskValue]
      properties:
        brandId:
          type: string
          nullable: true
          description: "Nur in `byBrand`-Einträgen gesetzt."
        ownerId:
          type: string
          nullable: true
          description: "Nur in `byOwner`-Einträgen gesetzt."
        name: { type: string, description: "Anzeige-Name (Brand- bzw. Owner-Name; '—' wenn unbekannt)" }
        value: { type: number, description: "Summe valueAmount in EUR für diesen Brand/Owner im Bucket" }
        count: { type: integer, description: "Anzahl Renewals für diesen Brand/Owner im Bucket" }
        atRiskCount: { type: integer, description: "Anzahl davon mit riskScore >= 70" }
        atRiskValue: { type: number, description: "Summe valueAmount davon mit riskScore >= 70" }

    RenewalNotifyResult:
      type: object
      required: [notified, ownerId, ownerName, source]
      properties:
        notified: { type: boolean }
        ownerId: { type: string }
        ownerName: { type: string }
        ownerEmail: { type: ["string", "null"] }
        source:
          type: string
          enum: [account, contract]
          description: "Wo der Owner aufgelöst wurde."

    RenewalBulkInput:
      type: object
      required: [ids, action]
      properties:
        ids:
          type: array
          items: { type: string }
          minItems: 1
        action:
          type: string
          enum: [snooze, won, lost, cancelled, open, notify]
        snoozedUntil:
          type: ["string", "null"]
          format: date
          description: "Erforderlich bei action=snooze."
        notes: { type: ["string", "null"] }

    RenewalBulkNotifiedItem:
      type: object
      required: [id, ownerId, ownerName]
      properties:
        id: { type: string }
        ownerId: { type: string }
        ownerName: { type: string }

    RenewalBulkResult:
      type: object
      required: [updated, notified, skipped, skippedIds, skippedReasons]
      properties:
        updated: { type: integer }
        notified:
          type: array
          items: { $ref: "#/components/schemas/RenewalBulkNotifiedItem" }
        skipped: { type: integer }
        skippedIds:
          type: array
          items: { type: string }
        skippedReasons:
          type: object
          additionalProperties: { type: string }

    BrandClauseOverride:
      type: object
      required: [id, tenantId, brandId, baseVariantId, createdAt, updatedAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        brandId: { type: string }
        baseVariantId: { type: string }
        name: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        body: { type: string, nullable: true }
        tone: { type: string, nullable: true }
        severity: { type: string, nullable: true }
        severityScore: { type: integer, nullable: true, minimum: 1, maximum: 5 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    BrandClauseOverridePatch:
      type: object
      properties:
        name: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        body: { type: string, nullable: true }
        tone: { type: string, nullable: true }
        severity: { type: string, nullable: true }
        severityScore: { type: integer, nullable: true, minimum: 1, maximum: 5 }

    ClauseCompatibilityRule:
      type: object
      required: [id, tenantId, fromVariantId, toVariantId, kind, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        fromVariantId: { type: string }
        toVariantId: { type: string }
        kind: { type: string, enum: [requires, conflicts] }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    ClauseCompatibilityCreate:
      type: object
      required: [fromVariantId, toVariantId, kind]
      properties:
        fromVariantId: { type: string }
        toVariantId: { type: string }
        kind: { type: string, enum: [requires, conflicts] }
        note: { type: string, nullable: true }

    ContractClauseCompatibility:
      type: object
      required: [contractClauseId, familyName, status, conflicts, requiresOpen, requiresOk]
      properties:
        contractClauseId: { type: string }
        familyId: { type: string, nullable: true }
        familyName: { type: string }
        activeVariantId: { type: string, nullable: true }
        activeVariantName: { type: string }
        status: { type: string, enum: [ok, warning, conflict] }
        conflicts:
          type: array
          items:
            type: object
            required: [withVariantId, withVariantName, withFamilyId, withFamilyName]
            properties:
              withVariantId: { type: string }
              withVariantName: { type: string }
              withFamilyId: { type: string }
              withFamilyName: { type: string }
              note: { type: string, nullable: true }
        requiresOpen:
          type: array
          items:
            type: object
            required: [requiredVariantId, requiredVariantName, requiredFamilyId, requiredFamilyName]
            properties:
              requiredVariantId: { type: string }
              requiredVariantName: { type: string }
              requiredFamilyId: { type: string }
              requiredFamilyName: { type: string }
              note: { type: string, nullable: true }
        requiresOk:
          type: array
          items:
            type: object
            required: [requiredVariantId, requiredVariantName]
            properties:
              requiredVariantId: { type: string }
              requiredVariantName: { type: string }
              note: { type: string, nullable: true }

    ContractCompatibilityReport:
      type: object
      required: [contractId, items]
      properties:
        contractId: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/ContractClauseCompatibility" }

    # ── Magic-Link / External Collaborators (Task #70) ──
    ExternalCollaborator:
      type: object
      required: [id, contractId, email, capabilities, editableFields, ipAllowlist, status, expiresAt, createdBy, createdAt]
      properties:
        id: { type: string }
        contractId: { type: string }
        email: { type: string, format: email }
        name: { type: ["string", "null"] }
        organization: { type: ["string", "null"] }
        capabilities:
          type: array
          items:
            type: string
            enum: [view, comment, edit_fields, sign_party]
        editableFields:
          description: Whitelist der Vertrags-Felder, die der Magic-Link bearbeiten darf. Nur relevant bei capability `edit_fields`.
          type: array
          items:
            type: string
            enum: [effectiveFrom, effectiveTo, governingLaw, jurisdiction]
        ipAllowlist:
          description: Optionale IP-Allowlist (IPv4/IPv6/CIDR). Leer = keine Einschraenkung.
          type: array
          items: { type: string }
        status:
          type: string
          enum: [active, expired, revoked]
        expiresAt: { type: string, format: date-time }
        revokedAt: { type: ["string", "null"], format: date-time }
        revokedBy: { type: ["string", "null"] }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: ["string", "null"], format: date-time }
        tokenPlaintext:
          description: Wird ausschliesslich beim POST-Create gesetzt — danach IMMER null.
          type: ["string", "null"]
        emailSent:
          description: |
            Ergebnis des Einladungs-E-Mail-Versands. Nur beim POST-Create gesetzt
            (oder null, wenn kein Versand angefordert oder ein Validierungsfehler
            beim Magic-Link-URL-Bau aufgetreten ist).
          oneOf:
            - type: "null"
            - type: object
              required: [ok, provider]
              properties:
                ok: { type: boolean }
                provider:
                  type: string
                  description: "z.B. 'resend' (echter Versand) oder 'log' (Dev-Modus, nur Logger)."
                error: { type: ["string", "null"] }

    ExternalCollaboratorCreate:
      type: object
      required: [email, capabilities]
      properties:
        email: { type: string, format: email }
        name: { type: ["string", "null"] }
        organization: { type: ["string", "null"] }
        capabilities:
          type: array
          minItems: 1
          items:
            type: string
            enum: [view, comment, edit_fields, sign_party]
        editableFields:
          description: Pflicht (mind. 1 Eintrag), wenn capabilities `edit_fields` enthaelt. Sonst leer/weglassen.
          type: array
          items:
            type: string
            enum: [effectiveFrom, effectiveTo, governingLaw, jurisdiction]
        ipAllowlist:
          description: Optionale IP-Allowlist. Eintraege koennen einzelne IPs (v4/v6) oder CIDR-Blocks sein. Max. 32 Eintraege.
          type: array
          maxItems: 32
          items: { type: string }
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 30
          default: 14
        sendEmail:
          description: |
            Wenn true (Default), verschickt der Server unmittelbar nach dem
            Erstellen des Magic-Links eine gebrandete Einladungs-E-Mail an die
            angegebene Adresse. Auf false setzen, wenn der Link nur erzeugt
            werden soll (z.B. um ihn manuell zu verteilen).
          type: boolean
          default: true
        magicLinkBaseUrl:
          description: |
            Optionale absolute Basis-URL (Schema + Host + ggf. Web-App-Base-Pfad,
            ohne Trailing-Slash), an die "/external/<token>" angehaengt wird,
            um die Einladungs-URL zu bauen. Muss zum Origin des Requests passen
            (Schutz vor Phishing-Relay). Wenn nicht gesetzt, wird die URL aus
            dem Request abgeleitet.
          type: ["string", "null"]
          format: uri

    ExternalCollaboratorEvent:
      description: Aktivitaets-Event eines Magic-Links (Audit-Trail). Tenant-isoliert.
      type: object
      required: [id, collaboratorId, contractId, action, payload, createdAt]
      properties:
        id: { type: string }
        collaboratorId: { type: string }
        contractId: { type: string }
        action:
          type: string
          enum: [created, viewed, commented, edited_fields, revoked, expired_attempt]
        payload:
          type: object
          additionalProperties: true
        ipAddress: { type: ["string", "null"] }
        userAgent: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    ExternalContractFieldEdit:
      description: |
        Felder-Edit ueber Magic-Link. Nur die in collab.editableFields freigegebenen Felder
        werden geschrieben; alles andere wird ignoriert/abgelehnt.
      type: object
      properties:
        effectiveFrom: { type: ["string", "null"], description: "YYYY-MM-DD oder null" }
        effectiveTo: { type: ["string", "null"], description: "YYYY-MM-DD oder null" }
        governingLaw: { type: ["string", "null"] }
        jurisdiction: { type: ["string", "null"] }

    ExternalContractFieldEditResult:
      type: object
      required: [contract, updatedFields]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            effectiveFrom: { type: ["string", "null"] }
            effectiveTo: { type: ["string", "null"] }
            governingLaw: { type: ["string", "null"] }
            jurisdiction: { type: ["string", "null"] }
        updatedFields:
          type: array
          items: { type: string }

    ContractComment:
      type: object
      required: [id, contractId, authorType, authorName, body, createdAt]
      properties:
        id: { type: string }
        contractId: { type: string }
        contractClauseId: { type: ["string", "null"] }
        authorType:
          type: string
          enum: [user, external]
        authorName: { type: string }
        body: { type: string }
        createdAt: { type: string, format: date-time }

    ContractCommentCreate:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 4000 }
        contractClauseId: { type: ["string", "null"] }

    ExternalContractView:
      type: object
      required: [collaborator, contract, brand, clauses, comments]
      properties:
        collaborator:
          type: object
          required: [id, email, capabilities, editableFields, expiresAt]
          properties:
            id: { type: string }
            email: { type: string, format: email }
            name: { type: ["string", "null"] }
            organization: { type: ["string", "null"] }
            capabilities:
              type: array
              items: { type: string, enum: [view, comment, edit_fields, sign_party] }
            editableFields:
              type: array
              items: { type: string, enum: [effectiveFrom, effectiveTo, governingLaw, jurisdiction] }
            expiresAt: { type: string, format: date-time }
        contract:
          type: object
          required: [id, title, status]
          properties:
            id: { type: string }
            title: { type: string }
            status: { type: string }
            template: { type: ["string", "null"] }
            currency: { type: ["string", "null"] }
            effectiveFrom: { type: ["string", "null"], format: date }
            effectiveTo: { type: ["string", "null"], format: date }
            governingLaw: { type: ["string", "null"] }
            jurisdiction: { type: ["string", "null"] }
        brand:
          oneOf:
            - type: "null"
            - type: object
              required: [id, name]
              properties:
                id: { type: string }
                name: { type: string }
                primaryColor: { type: ["string", "null"] }
                logoUrl: { type: ["string", "null"] }
        clauses:
          type: array
          items:
            type: object
            required: [id, family, variant, severity, summary]
            properties:
              id: { type: string }
              family: { type: string }
              variant: { type: string }
              severity: { type: string }
              summary: { type: string }
        comments:
          type: array
          items: { $ref: "#/components/schemas/ContractComment" }

    AiRecommendation:
      type: object
      required: [id, promptKey, suggestion, confidence, status, createdAt]
      properties:
        id: { type: string }
        promptKey: { type: string }
        entityType: { type: ["string", "null"] }
        entityId: { type: ["string", "null"] }
        suggestion: {}
        confidence: { type: number, minimum: 0, maximum: 1 }
        status:
          type: string
          enum: [pending, accepted, rejected, modified]
        modifiedSuggestion: {}
        feedbackText: { type: ["string", "null"] }
        decidedBy: { type: ["string", "null"] }
        decidedAt: { type: ["string", "null"], format: date-time }
        aiInvocationId: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    AiRecommendationPatch:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, accepted, rejected, modified]
        modifiedSuggestion:
          description: Pflicht bei status=modified — der vom User editierte Vorschlag.
        feedback:
          type: ["string", "null"]
          maxLength: 2000

    AiRecommendationCalibrationBucket:
      type: object
      required: [range, total, acceptanceRate]
      properties:
        range:
          type: string
          enum: ["0-25", "25-50", "50-75", "75-100"]
        total: { type: integer, minimum: 0 }
        acceptanceRate:
          type: ["number", "null"]
          minimum: 0
          maximum: 1

    AiRecommendationMetric:
      type: object
      required:
        [ promptKey, count, pending, accepted, rejected, modified,
          acceptanceRate, averageConfidence, averageConfidenceDecided,
          weightedQualityScore, calibration, trend ]
      properties:
        promptKey: { type: string }
        count: { type: integer, minimum: 0 }
        pending: { type: integer, minimum: 0 }
        accepted: { type: integer, minimum: 0 }
        rejected: { type: integer, minimum: 0 }
        modified: { type: integer, minimum: 0 }
        acceptanceRate:
          type: ["number", "null"]
          minimum: 0
          maximum: 1
        averageConfidence:
          type: number
          minimum: 0
          maximum: 1
        # Durchschnittliche Konfidenz aller bereits entschiedenen Empfehlungen
        # (accepted + modified + rejected). Basis fuer den
        # `weightedQualityScore`. Faellt auf `averageConfidence` zurueck,
        # solange noch nichts entschieden wurde.
        averageConfidenceDecided:
          type: number
          minimum: 0
          maximum: 1
        # Qualitaetsindex pro Prompt (Task #69):
        # `acceptanceRate * averageConfidenceDecided`. `null` solange noch
        # keine Entscheidung getroffen wurde. Wertebereich [0..1].
        weightedQualityScore:
          type: ["number", "null"]
          minimum: 0
          maximum: 1
        calibration:
          type: array
          items: { $ref: "#/components/schemas/AiRecommendationCalibrationBucket" }
        # 7-Tage-Zeittrend pro Prompt fuer die Reports-Tile-Sparkline.
        # Jeder Eintrag ist ein Tag im Format YYYY-MM-DD; Tage ohne Daten
        # erscheinen mit total=0/decided=0/accepted=0/acceptanceRate=null.
        trend:
          type: array
          items: { $ref: "#/components/schemas/AiRecommendationTrendPoint" }

    AiRecommendationTrendPoint:
      type: object
      required: [date, total, decided, accepted, acceptanceRate]
      properties:
        date: { type: string, format: date }
        total: { type: integer, minimum: 0 }
        decided: { type: integer, minimum: 0 }
        accepted: { type: integer, minimum: 0 }
        acceptanceRate:
          type: ["number", "null"]
          minimum: 0
          maximum: 1
