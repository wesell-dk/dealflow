        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExternalCollaboratorEvent" }
        "403": { description: forbidden }
        "404": { description: collaborator not found }

  /contracts/{id}/external-events:
    get:
      operationId: listContractExternalEvents
      tags: [external-collaborators]
