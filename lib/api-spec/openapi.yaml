      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [accept, reject]
        # Bei accept: Pflicht — Familie, in der die neue Variante landen soll
        # (entweder aus suggestedFamilyId oder eine vom Editor manuell
        # gewaehlte). Bei reject ignoriert.
        familyId: { type: ["string", "null"] }
        # Optional: bei accept, wenn der Editor stattdessen eine Translation
        # auf einer existierenden Variante anlegen will (z. B. Job-Sprache=en,
        # Match auf eine bestehende DE-Basis). Wenn null bei language=de:
        # neue Basis-Variante in familyId. Wenn null bei language=en:
        # Fehler "targetVariantId required for translation".
        targetVariantId: { type: ["string", "null"] }
        # Override fuer Name/Tonalitaet/Severity (Editor kann KI-Vorschlag
        # vor Save anpassen). Wenn null: KI-Vorschlag uebernehmen.
        nameOverride: { type: ["string", "null"] }
