  /contracts/{id}/request-approval:
    post:
      operationId: requestContractApproval
      tags: [contracts]
      summary: Freigabe für einen Vertrag anfordern (mit Pflicht-Bausteine-Vorprüfung)
      description: >
        Erstellt eine pending Approval für den Vertrag. Wenn der Vertragstyp
        Pflicht-CUAD-Kategorien definiert, die im Vertrag fehlen
        (`missingExpectedCount > 0`), antwortet der Endpoint mit 409 und
        verweigert das Erzeugen einer Approval. Tenant-Admins können den
        Block via `override: true` mit `overrideReason` (Pflichttext, ≥10
        Zeichen) umgehen — der Override wird strukturiert ins Audit-Log
        geschrieben.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestContractApprovalInput" }
      responses:
        "201":
          description: Approval angelegt (ggf. via Override).
          content:
            application/json:
              schema:
                type: object
                required: [approvalId, override, missingExpectedCount]
                properties:
                  approvalId: { type: string }
                  override: { type: boolean }
                  overrideReason:
                    type: ["string", "null"]
                  missingExpectedCount: { type: integer }
                  contractTypeName:
                    type: ["string", "null"]
        "409":
          description: >
            Pflicht-CUAD-Kategorien fehlen — Standardweg ist gesperrt. Die
            UI zeigt die fehlenden Bausteine und bietet Tenant-Admins den
            Override an.
          content:
            application/json:
              schema:
                type: object
                required: [error, code, missingExpectedCount, missing]
                properties:
                  error: { type: string }
                  code:
                    type: string
                    enum: [cuad_required_missing]
                  missingExpectedCount: { type: integer }
                  contractTypeId: { type: ["string", "null"] }
                  contractTypeName: { type: ["string", "null"] }
                  missing:
                    type: array
                    items:
                      type: object
                      required: [cuadCategoryId, code, name]
                      properties:
                        cuadCategoryId: { type: string }
                        code: { type: string }
                        name: { type: string }
        "403": { description: Override-Versuch ohne Tenant-Admin-Rechte. }
        "404": { description: Vertrag existiert nicht oder Zugriff verweigert. }
        "422": { description: override=true ohne ausreichend langen overrideReason. }

