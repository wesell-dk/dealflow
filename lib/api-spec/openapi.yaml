components:
  schemas:

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
        kind:
          type: string
          enum: [logo, document]
          description: "logo (admin only, 2MB images) or document (any user, 25MB docs+images). Default: logo for backward compatibility."

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL: { type: string }
        objectPath: { type: string }
        metadata:
          type: object
          properties:
            name: { type: string }
            size: { type: integer }
            contentType: { type: string }

    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    # ── Org ──
    Tenant:
      type: object
      required: [id, name, plan, region, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        plan: { type: string }
        region: { type: string }
        createdAt: { type: string, format: date-time }

    Company:
      type: object
      required: [id, tenantId, name, legalName, country, currency]
      properties:
        id: { type: string }
        tenantId: { type: string }
        name: { type: string }
        legalName: { type: string }
        country: { type: string }
        currency: { type: string }

    Brand:
      type: object
      required: [id, companyId, name, color, voice]
      properties:
        id: { type: string }
        companyId: { type: string }
        name: { type: string }
        color: { type: string }
        voice: { type: string }
        defaultClauseVariants:
          type: object
          additionalProperties: { type: string }
          description: Map familyId → variantId
        logoUrl: { type: string, nullable: true }
        primaryColor: { type: string, nullable: true }
        secondaryColor: { type: string, nullable: true }
        tone: { type: string, nullable: true, description: "precise | premium | concise | bold" }
        legalEntityName: { type: string, nullable: true }
        addressLine: { type: string, nullable: true }

    BrandUpdate:
      type: object
      properties:
        name: { type: string }
        color: { type: string }
        voice: { type: string }
        logoUrl: { type: string, nullable: true }
        primaryColor: { type: string, nullable: true }
        secondaryColor: { type: string, nullable: true }
        tone: { type: string, nullable: true }
        legalEntityName: { type: string, nullable: true }
        addressLine: { type: string, nullable: true }

    CompanyCreate:
      type: object
      required: [name, legalName, country, currency]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        legalName: { type: string, minLength: 1, maxLength: 200 }
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO-3166 Alpha-2 (z. B. DE, CH, AT)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO-4217 (z. B. EUR, CHF, USD)

    CompanyUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        legalName: { type: string, minLength: 1, maxLength: 200 }
        country: { type: string, minLength: 2, maxLength: 2 }
        currency: { type: string, minLength: 3, maxLength: 3 }

    BrandCreate:
      type: object
      required: [companyId, name]
      properties:
        companyId: { type: string }
        name: { type: string, minLength: 1, maxLength: 200 }
        color:
          type: string
          description: Primärfarbe als #RRGGBB (Default #2D6CDF wenn leer).
        voice:
          type: string
          description: Tonalität (precise | premium | concise | bold). Default precise.
        logoUrl: { type: string, nullable: true }
        primaryColor: { type: string, nullable: true }
        secondaryColor: { type: string, nullable: true }
        tone: { type: string, nullable: true }
        legalEntityName: { type: string, nullable: true }
        addressLine: { type: string, nullable: true }

    DeleteOrgConflict:
      type: object
      required: [error, blockers]
      properties:
        error: { type: string, example: "in use" }
        blockers:
          type: object
          description: Anzahl blockierender Datensätze pro Entitätstyp.
          properties:
            brands: { type: integer, format: int32 }
            deals: { type: integer, format: int32 }
            quotes: { type: integer, format: int32 }
            contracts: { type: integer, format: int32 }
            pricePositions: { type: integer, format: int32 }

    BrandDefaultsInput:
      type: object
      required: [defaults]
      properties:
        defaults:
          type: object
          additionalProperties: { type: string }

    User:
      type: object
      required: [id, name, email, role, scope, initials]
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string }
