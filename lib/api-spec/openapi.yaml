openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: |
    DealFlow One — Commercial Execution Platform API.
    Multi-tenant, multi-company, multi-brand. Deal-centric.
servers:
  - url: /api/v1
    description: Versioned API path (current)
  - url: /api
    description: Legacy unversioned API path (deprecated, alias for /api/v1)

tags:
  - name: health
  - name: orgs
  - name: users
  - name: accounts
  - name: contacts
  - name: deals
  - name: quotes
  - name: pricing
  - name: approvals
  - name: contracts
  - name: negotiations
  - name: signatures
  - name: priceIncreases
  - name: reports
  - name: copilot
  - name: activity
  - name: Storage

paths:

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400': { description: Invalid request }
        '500': { description: Failed to generate upload URL }


  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ───────────── ORGANISATION ─────────────

  /orgs/tenant:
    get:
      operationId: getTenant
      tags: [orgs]
      summary: Get the currently active tenant (single-tenant demo)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }

  /orgs/companies:
    get:
      operationId: listCompanies
      tags: [orgs]
      parameters:
        - in: query
          name: permitted
          required: false
          schema: { type: boolean }
          description: |
            If true, returns the FULL permitted set (ignoring active scope filter).
            Used by the scope picker so users can switch back from a restricted view.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Company" }
    post:
      operationId: createCompany
      tags: [orgs]
      summary: Neue Gesellschaft (legal entity) im Tenant anlegen
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompanyCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
        "403":
          description: tenant admin rights required
        "409":
          description: name already exists in tenant

  /orgs/companies/{id}:
    patch:
      operationId: updateCompany
      tags: [orgs]
      summary: Stammdaten einer Gesellschaft ändern
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompanyUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      operationId: deleteCompany
      tags: [orgs]
      summary: Gesellschaft entfernen (nur wenn keine Brands/Deals/Verträge anhängen)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: deleted }
        "403": { description: forbidden }
        "404": { description: not found }
        "409":
          description: |
            Konflikt — Gesellschaft hat noch verknüpfte Datensätze (Brands, Deals
            oder Verträge). Die Antwort enthält die jeweiligen Anzahlen.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteOrgConflict" }

  /orgs/brands:
    get:
      operationId: listBrands
      tags: [orgs]
      parameters:
        - in: query
          name: permitted
          required: false
          schema: { type: boolean }
          description: |
            If true, returns the FULL permitted set (ignoring active scope filter).
            Used by the scope picker so users can switch back from a restricted view.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Brand" }
    post:
      operationId: createBrand
      tags: [orgs]
      summary: Neuen Brand zu einer Gesellschaft hinzufügen
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BrandCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Brand" }
        "403": { description: forbidden }
        "404": { description: company not found }
        "409": { description: name already exists for company }

  /orgs/brands/{id}:
    delete:
      operationId: deleteBrand
      tags: [orgs]
      summary: Brand entfernen (nur wenn keine Deals/Verträge/Angebote anhängen)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: deleted }
        "403": { description: forbidden }
        "404": { description: not found }
        "409":
          description: Konflikt — Brand hat noch verknüpfte Datensätze.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteOrgConflict" }

  /brands:
    get:
      operationId: listBrandsWithDefaults
      tags: [clauses]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Brand" }

  /brands/{id}:
    patch:
      operationId: updateBrand
      tags: [clauses]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BrandUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Brand" }

  /brands/{id}/default-clauses:
    patch:
      operationId: updateBrandDefaultClauses
      tags: [clauses]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BrandDefaultsInput" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Brand" }

  /orgs/users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }

  /orgs/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeUser" }

  /orgs/me/active-scope:
    patch:
      operationId: updateActiveScope
      tags: [users]
      summary: Update aktiver Scope (Mandanten-Switcher)
      description: |
        Setzt die aktive Sicht des Users (Companies/Brands). NULL pro Liste
        bedeutet "alle erlaubten" für diese Dimension. Server validiert hart
        gegen die Permissions — Restricted User können nie über ihre
        Berechtigungen hinaus filtern.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateActiveScopeBody" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActiveScopeUpdateResult" }
        "403":
          description: Scope nicht erlaubt

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminUser" }
    post:
      operationId: createAdminUser
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUserCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }

  /admin/users/{id}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUserUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }

  /admin/roles:
    get:
      operationId: listRoles
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Role" }
    post:
      operationId: createRole
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Role" }

  /admin/roles/{id}:
    patch:
      operationId: updateRole
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Role" }
    delete:
      operationId: deleteRole
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: no content

  /admin/scope-tree:
    get:
      operationId: getScopeTree
      tags: [admin]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScopeTree" }

  # ───────────── ACCOUNTS / CONTACTS ─────────────

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Account" }
    post:
      operationId: createAccount
      tags: [accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountDetail" }
    patch:
      operationId: updateAccount
      tags: [accounts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountPatch" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        "403": { description: forbidden }
        "404": { description: not found }

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      parameters:
        - in: query
          name: accountId
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Contact" }

  # ───────────── DEALS ─────────────

  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      parameters:
        - in: query
          name: stage
          required: false
          schema: { type: string }
        - in: query
          name: ownerId
          required: false
          schema: { type: string }
        - in: query
          name: companyId
          required: false
          schema: { type: string }
        - in: query
          name: brandId
          required: false
          schema: { type: string }
        - in: query
          name: search
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Deal" }
    post:
      operationId: createDeal
      tags: [deals]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DealInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Deal" }

  /deals/pipeline:
    get:
      operationId: getDealPipeline
      tags: [deals]
      summary: Pipeline overview grouped by stage
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DealPipeline" }

  /deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DealDetail" }
    patch:
      operationId: updateDeal
      tags: [deals]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DealPatch" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Deal" }

  /deals/{id}/timeline:
    get:
      operationId: getDealTimeline
      tags: [deals, activity]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimelineEvent" }

  # ───────────── QUOTES ─────────────

  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      parameters:
        - in: query
          name: dealId
          required: false
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Quote" }
    post:
      operationId: createQuote
      tags: [quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuoteDetail" }

  /quotes/{id}/pdf:
    get:
      operationId: getQuotePdf
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /quotes/{id}/versions:
    post:
      operationId: createQuoteVersion
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteVersionInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuoteVersion" }

  /quotes/{id}/accept:
    post:
      operationId: acceptQuote
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }

  /quotes/from-template:
    post:
      operationId: createQuoteFromTemplate
      tags: [quotes]
      summary: Create a quote from a template (Wizard backend)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteFromTemplateInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuoteDetail" }

  /quote-versions/{id}/line-items:
    put:
      operationId: replaceQuoteLineItems
      tags: [quotes]
      summary: Replace all line items of a draft quote version
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items: { $ref: "#/components/schemas/LineItemInput" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [items, totalAmount]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/LineItem" }
                  totalAmount: { type: number }

  /quote-versions/{id}/attachments:
    get:
      operationId: listQuoteAttachments
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuoteAttachment" }
    post:
      operationId: addQuoteAttachment
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteAttachmentInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuoteAttachment" }

  /quote-attachments/{id}:
    delete:
      operationId: removeQuoteAttachment
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: removed

  # ───────────── QUOTE TEMPLATES ─────────────

  /quote-templates:
    get:
      operationId: listQuoteTemplates
      tags: [quotes]
      parameters:
        - in: query
          name: industry
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/QuoteTemplate" }
    post:
      operationId: createQuoteTemplate
      tags: [quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteTemplateInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuoteTemplate" }

  /quote-templates/{id}:
    get:
      operationId: getQuoteTemplate
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuoteTemplate" }
    patch:
      operationId: updateQuoteTemplate
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteTemplateInput" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuoteTemplate" }
    delete:
      operationId: deleteQuoteTemplate
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: removed

  # ───────────── ATTACHMENT LIBRARY ─────────────

  /attachment-library:
    get:
      operationId: listAttachmentLibrary
      tags: [quotes]
      parameters:
        - in: query
          name: category
          required: false
          schema: { type: string }
        - in: query
          name: tag
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AttachmentLibraryItem" }
    post:
      operationId: createAttachmentLibraryItem
      tags: [quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttachmentLibraryInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttachmentLibraryItem" }

  /attachment-library/{id}:
    delete:
      operationId: deleteAttachmentLibraryItem
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: removed

  # ───────────── INDUSTRY PROFILES ─────────────

  /industry-profiles:
    get:
      operationId: listIndustryProfiles
      tags: [quotes]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IndustryProfile" }
    post:
      operationId: createIndustryProfile
      tags: [quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IndustryProfileInput" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IndustryProfile" }

  /industry-profiles/{id}:
    patch:
      operationId: updateIndustryProfile
      tags: [quotes]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IndustryProfileInput" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IndustryProfile" }

  # ───────────── PRICING ─────────────

  /price-positions:
    get:
      operationId: listPricePositions
      tags: [pricing]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
