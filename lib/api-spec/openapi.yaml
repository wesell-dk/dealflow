        round-trip against the configured LLM provider and writes one
        ai_invocations audit row.
      responses:
        "200":
          description: Provider reachable, structured response validated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiHealthOk" }
        "403":
          description: Caller is not a tenant-wide admin.
        "502":
          description: Provider call failed or returned invalid output.
        "503":
          description: AI provider not configured.

  /copilot/deal-summary/{dealId}:
    post:
      operationId: runDealSummary
      tags: [copilot]
      summary: |
        AI-generated deal summary (10 modes / mode 1). Builds a tenant- and
        scope-validated DealContext, calls the LLM via the structured-output
        orchestrator, persists a copilot_insight (kind=ai_deal_summary), and
        writes one ai_invocations audit row.
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Structured deal summary returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DealSummaryEnvelope" }
        "403": { description: Caller lacks scope on this deal. }
        "404": { description: Deal does not exist for this tenant. }
        "502": { description: AI provider failed or returned invalid output. }
        "503": { description: AI provider not configured. }

