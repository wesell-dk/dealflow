      type: object
      required: [topic, summary, source]
      properties:
        topic: { type: string }
        summary: { type: string }
        source: { type: string }
        priority: { type: string }
        priceDeltaPct: { type: number }
        termMonthsDelta: { type: integer }
        paymentTermsDeltaDays: { type: integer }
        requestedClauseVariantId: { type: string }
        createNewVersion: { type: boolean }

    NegotiationImpact:
      type: object
      required: [reactionId, followUps, approvalsTriggered, riskTrend]
      properties:
        reactionId: { type: string }
        priceDeltaPct: { type: ["number", "null"] }
        newTotalAmount: { type: ["number", "null"] }
        newDiscountPct: { type: ["number", "null"] }
        newMarginPct: { type: ["number", "null"] }
        marginDeltaPct: { type: ["number", "null"] }
        termMonthsDelta: { type: ["integer", "null"] }
        paymentTermsDeltaDays: { type: ["integer", "null"] }
        requestedClauseVariantId: { type: ["string", "null"] }
        linkedQuoteVersionId: { type: ["string", "null"] }
        linkedApprovalId: { type: ["string", "null"] }
        followUps:
          type: array
          items: { type: string }
        approvalsTriggered:
          type: array
          items:
            type: object
            required: [type, reason]
